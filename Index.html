function pgMaintain(){
  const tasks = DB.maintain || [];
  const today = new Date();
  const overdue = tasks.filter(t=>!t.done && new Date(t.dueDate) < today);
  const upcoming = tasks.filter(t=>!t.done && new Date(t.dueDate) >= today).sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate));
  const done = tasks.filter(t=>t.done);

  $('page').innerHTML=`
  <div class="ph">
    <div><div class="pt">🗓️ جدول الصيانة الدورية</div>
    ${overdue.length?`<div class="ps" style="color:var(--rd)">⚠️ ${overdue.length} مهمة متأخرة</div>`:''}
    </div>
    <button class="btn btn-bl" onclick="openAddMaintain()">+ إضافة مهمة</button>
  </div>

  ${overdue.length?`
  <div style="margin:0 16px 16px">
    <div style="color:var(--rd);font-weight:700;margin-bottom:8px">🔴 متأخرة (${overdue.length})</div>
    ${overdue.map((t,i)=>`
    <div class="panel" style="border-right:3px solid var(--rd);margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:600">${esc(t.title)}</div>
          <div style="font-size:12px;color:var(--mt)">📍 ${esc(t.location)} — كانت بتاريخ: <span style="color:var(--rd)">${t.dueDate}</span></div>
          ${t.notes?`<div style="font-size:12px;color:var(--mt)">${esc(t.notes)}</div>`:''}
        </div>
        <div style="display:flex;gap:5px">
          <button class="btn btn-sm btn-gn" onclick="doneMaintain('${t.id}')">✅ تم</button>
          <button class="btn btn-sm btn-rd" onclick="delMaintain('${t.id}')">🗑</button>
        </div>
      </div>
    </div>`).join('')}
  </div>`:''}

  ${upcoming.length?`
  <div style="margin:0 16px 16px">
    <div style="color:var(--gn);font-weight:700;margin-bottom:8px">📅 القادمة (${upcoming.length})</div>
    ${upcoming.map(t=>{
      const daysLeft = Math.ceil((new Date(t.dueDate)-today)/(1000*60*60*24));
      const color = daysLeft<=3?'var(--rd)':daysLeft<=7?'var(--yl)':'var(--gn)';
      return `
    <div class="panel" style="border-right:3px solid ${color};margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:600">${esc(t.title)}</div>
          <div style="font-size:12px;color:var(--mt)">📍 ${esc(t.location)} — 📅 ${t.dueDate}</div>
          ${t.notes?`<div style="font-size:12px;color:var(--mt)">${esc(t.notes)}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
          <span style="font-size:12px;font-weight:700;color:${color}">${daysLeft===0?'اليوم':daysLeft+' يوم'}</span>
          <div style="display:flex;gap:5px">
            <button class="btn btn-sm btn-gn" onclick="doneMaintain('${t.id}')">✅</button>
            <button class="btn btn-sm btn-rd" onclick="delMaintain('${t.id}')">🗑</button>
          </div>
        </div>
      </div>
    </div>`;}).join('')}
  </div>`:''}

  ${done.length?`
  <div style="margin:0 16px 16px">
    <div style="color:var(--mt);font-weight:700;margin-bottom:8px">✅ منجزة (${done.length})</div>

function saveMaintain(){
  const title=val('mt-ttl'), loc=val('mt-loc'), dueDate=val('mt-date');
  if(!title||!dueDate){ toast('العنوان والتاريخ مطلوبان','err'); return; }
  const id=gid();
  fbSet('maintain/'+id,{id,title,location:loc,dueDate,repeat:val('mt-rep'),notes:val('mt-notes')||'',done:false,by:CU.name,createdAt:ts(),_ts:Date.now()});
  logAct('إضافة مهمة صيانة',title+' — '+loc+' — '+dueDate);
  // إشعار
  pushN('🗓️ مهمة صيانة جديدة: '+title+' في '+loc+' بتاريخ '+dueDate,'info');
  closeModal(); toast('تم إضافة المهمة');
}

function doneMaintain(id){
  const t = (DB.maintain||[]).find(x=>x.id===id);
  if(!t) return;
  fbUpdate('maintain/'+id,{done:true,doneAt:ts(),doneBy:CU.name});
  // إذا متكرر أضف المهمة القادمة تلقائياً
  if(t.repeat&&t.repeat!=='once'){
    const d=new Date(t.dueDate);
    if(t.repeat==='weekly') d.setDate(d.getDate()+7);
    else if(t.repeat==='monthly') d.setMonth(d.getMonth()+1);
    else if(t.repeat==='quarterly') d.setMonth(d.getMonth()+3);
    const newId=gid();
    fbSet('maintain/'+newId,{...t,id:newId,done:false,dueDate:d.toISOString().split('T')[0],createdAt:ts(),_ts:Date.now()});
  }
  logAct('إنجاز مهمة صيانة',t.title+' — '+t.location);
  toast('✅ تم تسجيل الإنجاز');
}

function delMaintain(id){
  if(!confirm('حذف المهمة؟')) return;
  fbDel('maintain/'+id);
  toast('تم الحذف','err');
}

function showQR(data, title){
  openModal(`${mhd('📱 QR Code — '+esc(title))}
  <div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:10px">
    <div id="qr-box" style="background:#fff;padding:16px;border-radius:12px"></div>
    <div style="font-size:12px;color:var(--mt);text-align:center;max-width:220px;word-break:break-all">${esc(data)}</div>
    <button class="btn btn-bl" onclick="downloadQR('${esc(title)}')">⬇️ تحميل</button>
  </div>`);
  setTimeout(()=>{
    const box = document.getElementById('qr-box');
    if(box && typeof QRCode !== 'undefined'){
      box.innerHTML = '';
      new QRCode(box, {text: data, width:200, height:200, colorDark:'#000', colorLight:'#fff'});
    }
  }, 100);
}

function downloadQR(title){
  const canvas = document.querySelector('#qr-box canvas');
  if(!canvas){ toast('QR غير جاهز','err'); return; }
  const a = document.createElement('a');
  a.download = 'QR_'+title+'.png';
  a.href = canvas.toDataURL();
  a.click();
  toast('تم تحميل QR Code');
}

function showCamQR(fsId, camId){
  const fs = DB.fieldSites.find(x=>x.id===fsId);
  const cam = fs?.cameras.find(x=>x.id===camId);
  if(!cam) return;
  const data = JSON.stringify({
    type:'CCTV_CAM',
    id: cam.id,
    name: cam.name,
    serial: cam.serial||'',
    site: fs.name,
    model: cam.model||'',
    ip: cam.ip||''
  });
  showQR(data, cam.name);
}

function showItemQR(item){
  const data = JSON.stringify({
    type:'CCTV_ITEM',
    id: item.id||item.serial,
    name: item.name,
    serial: item.serial||'',
    type2: item.type||'',
    site: item.currentSite||''
  });
  showQR(data, item.name);
}

function uploadFaultPhoto(faultId, input){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 500*1024){ toast('الصورة كبيرة جداً (الحد 500KB)','err'); return; }
  toast('⏳ جار الرفع...');
  const reader = new FileReader();
  reader.onload = e=>{
    const url = e.target.result;
    const f = DB.faults.find(x=>x.id===faultId);
    const photos = [...(f?.photos||[]), {url, by:CU.name, time:ts()}];
    fbUpdate('faults/'+faultId, {photos});
    logAct('رفع صورة عطل', f?.location+'/'+f?.pointId);
    closeModal();
    toast('✅ تم رفع الصورة');
  };
  reader.readAsDataURL(file);
}

  const f = DB.faults.find(x=>x.id===faultId);

  closeModal();
  toast('تم الحذف','err');

function doBackup(){
  const backup = {
    date: new Date().toISOString(),
    version: '1.0',
    data: {
      faults:    DB.faults,
      moves:     DB.moves,
      invoices:  DB.invoices,
      fieldSites:DB.fieldSites,
      maintain:  DB.maintain||[],
      sites:     DB.sites,
      inv:       DB.inv,
    }
  };
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'CCTV_Backup_'+new Date().toISOString().split('T')[0]+'.json';
  a.click();
  toast('✅ تم تصدير النسخة الاحتياطية');
  logAct('نسخة احتياطية', new Date().toLocaleDateString('ar-IQ'));
}

function restoreBackup(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const backup = JSON.parse(e.target.result);
      if(!backup.data){ toast('ملف غير صحيح','err'); return; }
      if(!confirm('⚠️ هذا سيستبدل البيانات الحالية. هل أنت متأكد؟')) return;
      // استعادة البيانات
      const d = backup.data;
      if(d.faults)    d.faults.forEach(f=>fbSet('faults/'+f.id,f));
      if(d.moves)     d.moves.forEach(m=>fbSet('moves/'+m.id,m));
      if(d.invoices)  d.invoices.forEach(i=>fbSet('invoices/'+i.id,i));
      if(d.fieldSites) d.fieldSites.forEach(fs=>fbSet('fieldSites/'+fs.id,fs));
      if(d.maintain)  d.maintain.forEach(t=>fbSet('maintain/'+t.id,t));
      toast('✅ تم استعادة النسخة الاحتياطية');
      logAct('استعادة نسخة احتياطية', backup.date);
      setTimeout(()=>go(PAGE),2000);
    }catch(e){ toast('خطأ في قراءة الملف','err'); }
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════════════════════
//  🏆 لوحة أداء الفنيين
// ═══════════════════════════════════════════════════════
function pgPerformance(){
  if(CU.role !== 'manager'){ $('page').innerHTML='<div style="text-align:center;padding:60px;color:var(--mt)">⛔ للمدير فقط</div>'; return; }

  // حساب إحصائيات كل فني
  const stats = {};
  DB.users.filter(u=>u.role==='technician'||u.role==='engineer'||u.role==='field').forEach(u=>{
    stats[u.name] = { name:u.name, role:u.role, resolved:0, inprog:0, comments:0, avgTime:0, times:[] };
  });

  DB.faults.forEach(f=>{
    // من أغلق العطل
    if(f.log){
      f.log.forEach(l=>{
        if(l.label==='تم الحل'||l.label==='محلول'){
          if(stats[l.by]) stats[l.by].resolved++;
        }
      });
    }
    if(f.status==='inprogress' && stats[f.by]) stats[f.by].inprog++;
    // وقت الحل
    if(f.status==='resolved' && f._ts && f._tsResolved && stats[f.by]){
      const h = (f._tsResolved - f._ts)/(1000*60*60);
      stats[f.by].times.push(h);
    }
    // التعليقات
    (f.comments||[]).forEach(c=>{ if(stats[c.by]) stats[c.by].comments++; });
  });

  // حساب متوسط وقت الحل
  Object.values(stats).forEach(s=>{
    s.avgTime = s.times.length ? (s.times.reduce((a,b)=>a+b,0)/s.times.length).toFixed(1) : '-';
  });

  // أشهر لاختيار الفترة
  const now = new Date();
  const months = [];
  for(let i=0;i<6;i++){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push({ label: d.toLocaleDateString('ar',{month:'long',year:'numeric'}), y:d.getFullYear(), m:d.getMonth() });
  }

  const sorted = Object.values(stats).sort((a,b)=>b.resolved-a.resolved);
  const medals = ['🥇','🥈','🥉'];

  $('page').innerHTML=`
  <div class="ph">
    <div class="pt">🏆 أداء الفنيين</div>
    <select id="perf-month" onchange="renderPerfMonth()" style="padding:8px 12px;border-radius:10px;border:1.5px solid var(--br);background:var(--bg);color:var(--tx);font-size:15px;font-family:inherit">
      ${months.map((m,i)=>`<option value="${i}">${m.label}</option>`).join('')}
    </select>
  </div>
  <div id="perf-body" style="padding:0 16px"></div>`;

  // تخزين البيانات للفلترة
  window._perfData = { stats, sorted, medals, months, DB_faults: DB.faults };
  renderPerfMonth();
}

function renderPerfMonth(){
  const sel = document.getElementById('perf-month');
  const mi = sel ? parseInt(sel.value)||0 : 0;
  const { stats, sorted, medals, months } = window._perfData;
  const {y, m} = months[mi];

  // فلترة الأعطال للشهر المختار
  const monthFaults = DB.faults.filter(f=>{
    if(!f.resolvedBy || f.status!=='resolved') return false;
    const d = new Date(f._tsResolved||0);
    return d.getFullYear()===y && d.getMonth()===m;
  });

  // إحصائيات الشهر لكل فرد
  const monthStats = {};
  Object.values(stats).forEach(s=>{ monthStats[s.name]={ ...s, mResolved:0, mFaults:[] }; });

  monthFaults.forEach(f=>{
    if(monthStats[f.resolvedBy]){
      monthStats[f.resolvedBy].mResolved++;
      monthStats[f.resolvedBy].mFaults.push(f);
    }
  });

  const msorted = Object.values(monthStats).sort((a,b)=>b.mResolved-a.mResolved);
  const el = document.getElementById('perf-body');
  if(!el) return;

  el.innerHTML = !msorted.filter(s=>s.mResolved>0).length
  ? `<div style="text-align:center;padding:40px;color:var(--mt)">لا أعطال محلولة هذا الشهر</div>`
  + msorted.map((s,i)=> renderPerfCard(s,i,medals,false)).join('')
  : msorted.map((s,i)=> renderPerfCard(s,i,medals,true)).join('');
}

function renderPerfCard(s, i, medals, showMonth){
  const borderColors = ['#f1c40f','#bdc3c7','#cd6133'];
  const hasMActivity = s.mResolved > 0;
  return `
  <div class="panel" style="margin-bottom:12px;${i<3&&hasMActivity?'border-right:3px solid '+(borderColors[i]||'var(--br)'):''}">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">

//  🗺️ تتبع موقع الفني الميداني GPS
// ═══════════════════════════════════════════════════════
let _gpsWatcher = null;

function startGPSTracking(){
  if(!navigator.geolocation){ toast('GPS غير مدعوم في هذا الجهاز','err'); return; }

  // طلب الموقع فوراً
  navigator.geolocation.getCurrentPosition(
    pos => updateTechLocation(pos),
    err => handleGPSError(err),
    {enableHighAccuracy:true, timeout:10000}
  );

  // تتبع مستمر كل 30 ثانية
  _gpsWatcher = navigator.geolocation.watchPosition(
    pos => updateTechLocation(pos),
    err => handleGPSError(err),
    {enableHighAccuracy:true, maximumAge:30000, timeout:15000}
  );
}

function stopGPSTracking(){
  if(_gpsWatcher !== null){
    navigator.geolocation.clearWatch(_gpsWatcher);
    _gpsWatcher = null;
  }
}

function updateTechLocation(pos){
  const uid = CU.uid||CU.id;
  fbSet('techLocations/'+uid, {
    uid, name:CU.name, role:CU.role,
    lat: pos.coords.latitude,
    lng: pos.coords.longitude,
    accuracy: Math.round(pos.coords.accuracy),
    updatedAt: ts(),
    _ts: Date.now(),
    online: true
  });
}

function handleGPSError(err){
  console.log('GPS error:', err.code, err.message);
}

function showGPSForceDialog(reason){
  // لا يمكن إغلاق هذا الحوار بدون تفعيل GPS
  const existing = document.getElementById('gps-force-dialog');
  if(existing) return;

  const div = document.createElement('div');
  div.id = 'gps-force-dialog';
  div.style.cssText = `
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,.85);z-index:9999;
    display:flex;align-items:center;justify-content:center;padding:20px
  `;
  div.innerHTML = `
    <div style="background:var(--sf);border-radius:18px;padding:28px;max-width:320px;width:100%;text-align:center">
      <div style="font-size:48px;margin-bottom:12px">📍</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:8px">تفعيل GPS مطلوب</div>
      <div style="font-size:17px;color:var(--mt);margin-bottom:6px">${reason||'يجب تفعيل خدمة الموقع للمتابعة'}</div>
      <div style="font-size:12px;color:var(--mt);margin-bottom:20px;background:var(--bg);padding:10px;border-radius:8px">
        كفني ميداني، يجب تفعيل GPS لتتبع موقعك أثناء العمل
      </div>
      <button onclick="retryGPS()" class="btn btn-bl btn-fw" style="margin-bottom:8px;padding:14px;font-size:17px">
        📍 تفعيل GPS الآن
      </button>
      <button onclick="doLogout()" class="btn btn-rd btn-fw" style="padding:14px;font-size:17px">
        🚪 تسجيل الخروج
      </button>
    </div>
  `;
  document.body.appendChild(div);
}

function retryGPS(){
  const dialog = document.getElementById('gps-force-dialog');
  navigator.geolocation.getCurrentPosition(
    pos => {
      updateTechLocation(pos);
      if(dialog) dialog.remove();
      startGPSTracking();
      toast('✅ GPS مفعّل');
    },
    err => handleGPSError(err),
    {enableHighAccuracy:true, timeout:10000}
  );
}

function dismissGPSDialog(){
  const d = document.getElementById('gps-force-dialog');
  if(d) d.remove();
}

// ═══════════════════════════════════════════════════════
//  📸 مسح QR بالكاميرا
// ═══════════════════════════════════════════════════════
let _qrScanner = null;

function openQRScanner(){
  openModal(`${mhd('📸 مسح QR Code')}
  <div style="text-align:center">
    <div style="position:relative;margin-bottom:12px">
      <video id="qr-video" style="width:100%;max-width:300px;border-radius:12px;background:#000" autoplay playsinline></video>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:150px;height:150px;border:2px solid var(--bl);border-radius:8px;pointer-events:none"></div>
    </div>
    <div id="qr-status" style="font-size:17px;color:var(--mt);margin-bottom:12px">جار تشغيل الكاميرا...</div>
    <div class="mft">
      <button class="btn btn-rd" onclick="stopQRScanner()">إيقاف</button>
    </div>
  </div>`);
  setTimeout(startQRScanner, 300);
}

function startQRScanner(){
  const video = document.getElementById('qr-video');
  if(!video) return;

  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
  .then(stream=>{
    video.srcObject = stream;
    _qrScanner = stream;
    scanQRFrame(video);
  })
  .catch(err=>{
    const el = document.getElementById('qr-status');
    if(el) el.textContent = '❌ لا يمكن الوصول للكاميرا';
  });
}

function scanQRFrame(video){
  if(!document.getElementById('qr-video')) return; // Modal مغلق
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  function tick(){
    if(!document.getElementById('qr-video')){ stopQRScanner(); return; }
    if(video.readyState === video.HAVE_ENOUGH_DATA){
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      try{
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        // استخدام jsQR إذا متاح
        if(typeof jsQR !== 'undefined'){
          const code = jsQR(imageData.data, imageData.width, imageData.height);
          if(code){
            stopQRScanner();
            handleQRResult(code.data);
            return;
          }
        }
      }catch(e){}
    }
    requestAnimationFrame(tick);
  }
  tick();
}

function stopQRScanner(){
  if(_qrScanner){
    _qrScanner.getTracks().forEach(t=>t.stop());
    _qrScanner = null;
  }
  closeModal();
}

function handleQRResult(data){
  try{
    const obj = JSON.parse(data);
    if(obj.type === 'CCTV_CAM'){
      // فتح بيانات الكاميرا
      const fs = DB.fieldSites.find(s=>s.name===obj.site);
      const cam = fs?.cameras.find(c=>c.id===obj.id||c.serial===obj.serial);
      if(cam&&fs){
        toast('✅ تم التعرف على الكاميرا: '+cam.name);
        openModal(`${mhd('📷 '+esc(cam.name))}
        <div style="display:flex;flex-direction:column;gap:8px;font-size:17px">
          <div class="panel"><b>الموقع:</b> ${esc(fs.name)}</div>
          <div class="panel"><b>السيريال:</b> ${esc(cam.serial||'—')}</div>
          <div class="panel"><b>النوع:</b> ${esc(cam.camType||'—')}</div>
          <div class="panel"><b>IP:</b> ${esc(cam.ip||'—')}</div>
          <div class="panel"><b>الحالة:</b> ${esc(cam.status||'—')}</div>
          ${cam.lat&&cam.lng?`<a href="https://maps.google.com/?q=${cam.lat},${cam.lng}" target="_blank" class="btn btn-bl">🗺️ الموقع</a>`:''}
        </div>
        <div class="mft" style="margin-top:12px">
          <button class="btn btn-gy" onclick="closeModal()">إغلاق</button>
          <button class="btn btn-rd" onclick="closeModal();openAddFault()">⚠️ إبلاغ عطل</button>
        </div>`);
      } else {
        toast('⚠️ الكاميرا غير موجودة في النظام','warn');
      }
    } else if(obj.type === 'CCTV_ITEM'){
      toast('✅ تم التعرف على الجهاز: '+obj.name);
      openModal(`${mhd('📦 '+esc(obj.name))}
      <div style="display:flex;flex-direction:column;gap:8px;font-size:17px">
        <div class="panel"><b>السيريال:</b> ${esc(obj.serial||'—')}</div>
        <div class="panel"><b>النوع:</b> ${esc(obj.type2||'—')}</div>
        <div class="panel"><b>الموقع:</b> ${esc(obj.site||'—')}</div>
      </div>
      <div class="mft" style="margin-top:12px">
        <button class="btn btn-gy" onclick="closeModal()">إغلاق</button>
      </div>`);
    } else {
      toast('QR: '+data.substring(0,50),'warn');
    }
  } catch(e){
    // QR نصي عادي
    toast('📋 QR: '+data.substring(0,60));
  }
}

// ═══════════════════════════════════════════════════════
//  📴 وضع Offline — حفظ البيانات محلياً
// ═══════════════════════════════════════════════════════
let _isOnline = navigator.onLine;
let _offlineQueue = JSON.parse(localStorage.getItem('cctv_offline_queue')||'[]');

window.addEventListener('online', ()=>{
  _isOnline = true;
  updateOnlineStatus(true);
  syncOfflineQueue();
});
window.addEventListener('offline', ()=>{
  _isOnline = false;
  updateOnlineStatus(false);
});

function updateOnlineStatus(online){
  const ind = document.getElementById('online-ind');
  if(ind){
    ind.textContent = online ? '🟢' : '🔴';
    ind.title = online ? 'متصل' : 'غير متصل — البيانات محفوظة محلياً';
  }
  if(!online) toast('📴 وضع offline — البيانات ستُزامن عند الاتصال','warn');
  else if(_offlineQueue.length) toast('🔄 جار مزامنة '+_offlineQueue.length+' عملية...');
}

// إضافة عملية للقائمة المؤجلة
function queueOfflineOp(op, path, data){
  _offlineQueue.push({op, path, data, time: Date.now()});
  localStorage.setItem('cctv_offline_queue', JSON.stringify(_offlineQueue));
  // حفظ البيانات محلياً فوراً
  const local = JSON.parse(localStorage.getItem('cctv_local_db')||'{}');
  local[path] = data;
  localStorage.setItem('cctv_local_db', JSON.stringify(local));
}

// مزامنة القائمة عند عودة الاتصال
function syncOfflineQueue(){
  if(!_offlineQueue.length) return;
  const queue = [..._offlineQueue];
  _offlineQueue = [];
  localStorage.setItem('cctv_offline_queue', '[]');
  
  queue.forEach(item=>{
    try{
      if(item.op==='set') FBDB.ref('cctv/'+item.path).set(item.data);
      else if(item.op==='push') FBDB.ref('cctv/'+item.path).push(item.data);
      else if(item.op==='update') FBDB.ref('cctv/'+item.path).update(item.data);
      else if(item.op==='delete') FBDB.ref('cctv/'+item.path).remove();
    }catch(e){ console.warn('Sync failed:', item.path); }
  });
  toast('✅ تمت المزامنة ('+queue.length+' عملية)');
}

// حفظ البيانات محلياً عند المزامنة
function cacheLocalDB(data){
  try{
    const mini = {
      faults: data.faults||{},
      notifs: data.notifs||{},
      fieldSites: data.fieldSites||{},
      maintain: data.maintain||{}
    };
    localStorage.setItem('cctv_local_db', JSON.stringify(mini));
  }catch(e){}
}

// تحميل البيانات المحلية عند offline
function loadLocalDB(){
  try{
    const local = JSON.parse(localStorage.getItem('cctv_local_db')||'{}');
    if(local.faults) DB.faults = Object.values(local.faults).sort((a,b)=>(b._ts||0)-(a._ts||0));
    if(local.notifs) DB.notifs = Object.values(local.notifs).sort((a,b)=>(b._ts||0)-(a._ts||0));
    if(local.fieldSites) DB.fieldSites = Object.values(local.fieldSites).map(fs=>({...fs,cameras:fs.cameras?Object.values(fs.cameras):[]}));
    if(local.maintain) DB.maintain = Object.values(local.maintain);
    toast('📴 عرض بيانات محفوظة — غير متصل','warn');
    if(PAGE) go(PAGE);
  }catch(e){}
}

function canAccessFault(f){
  if(!CU) return false;
  if(CU.role === 'manager') return true;
  if(CU.role === 'viewer') return true; // السيد يرى كل شيء لكن لا يعدل
  // عطل بدون موقع ميداني — يراه من لديه صلاحية faults
  if(!f.fieldSiteId) return p('faults');
  // عطل مرتبط بموقع — يراه فقط من لديه وصول للموقع
  const site = DB.fieldSites.find(s => s.id === f.fieldSiteId);
  if(!site) return false;
  return canUserSeeFieldSite(site);
}

function getVisibleFaults(){
  return DB.faults.filter(f => canAccessFault(f));
}

let _chatListener = null;

function pgChat(){
  const myUid = CU.uid||CU.id;
  $('page').innerHTML=`
  <div style="display:flex;flex-direction:column;height:calc(100vh - 58px)">
    <!-- هيدر الدردشة -->
    <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--sf);border-bottom:1px solid var(--br);flex-shrink:0">
      <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#0084ff,#00c6ff);display:flex;align-items:center;justify-content:center;font-size:20px">💬</div>
      <div>
        <div style="font-weight:700;font-size:16px">دردشة الفريق</div>
        <div style="font-size:12px;color:var(--gn)">● متصل</div>
      </div>
    </div>
    <!-- الرسائل -->
    <div id="chat-msgs" style="flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:4px;background:var(--bg)">
      <div style="text-align:center;color:var(--mt);padding:40px">⏳</div>
    </div>
    <!-- حقل الإدخال -->
    <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--sf);border-top:1px solid var(--br);flex-shrink:0">
      <input id="chat-inp" 
        style="flex:1;padding:10px 16px;border-radius:22px;border:1.5px solid var(--br);background:var(--bg);color:var(--tx);font-size:16px;outline:none;font-family:inherit" 
        placeholder="رسالة..." onkeydown="if(event.key==='Enter')sendChat()">
      <button onclick="sendChat()" style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#0084ff,#0099ff);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(0,132,255,.4)">↑</button>
    </div>
  </div>`;

  if(_chatListener) FBDB.ref('cctv/chat').off('value', _chatListener);
  _chatListener = FBDB.ref('cctv/chat').limitToLast(60).on('value', snap=>{
    const msgs = snap.val() ? Object.values(snap.val()).sort((a,b)=>(a._ts||0)-(b._ts||0)) : [];
    const el = document.getElementById('chat-msgs');
    if(!el) return;

    if(!msgs.length){
      el.innerHTML='<div style="text-align:center;color:var(--mt);padding:40px;font-size:15px">لا رسائل بعد 👋</div>';
      return;
    }

    let html = '';
    let lastDate = '';
    msgs.forEach((m,i)=>{
      const isMe = m.uid === myUid;
      const prev = msgs[i-1];
      const isFirst = !prev || prev.uid !== m.uid;
      const isLast  = !msgs[i+1] || msgs[i+1].uid !== m.uid;

      // فاصل التاريخ
      const msgDate = (m.time||'').split(' ')[0];
      if(msgDate && msgDate !== lastDate){
        lastDate = msgDate;
        html += `<div style="text-align:center;margin:12px 0 8px">
          <span style="background:var(--sf);border:1px solid var(--br);border-radius:20px;padding:4px 14px;font-size:12px;color:var(--mt)">${msgDate}</span>
        </div>`;
      }

      // أفاتار ملون
      const av = m.name?m.name[0]:'?';
      const avColor = RC[m.role]||'var(--bl)';

      html += `<div style="display:flex;flex-direction:${isMe?'row-reverse':'row'};align-items:flex-end;gap:6px;margin-bottom:${isLast?'8':'2'}px">
        ${!isMe&&isLast?`<div style="width:32px;height:32px;border-radius:50%;background:${avColor};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0">${av}</div>`
        :!isMe?'<div style="width:32px"></div>':''}
        <div style="max-width:72%;display:flex;flex-direction:column;align-items:${isMe?'flex-end':'flex-start'}">
          ${!isMe&&isFirst?`<div style="font-size:12px;color:${avColor};font-weight:700;margin-bottom:2px;padding:0 4px">${esc(m.name)}</div>`:''}
          <div style="background:${isMe?'linear-gradient(135deg,#0084ff,#0066cc)':'var(--sf)'};color:${isMe?'#fff':'var(--tx)'};
            padding:10px 14px;
            border-radius:${isMe
              ? (isFirst?'18px 4px 18px 18px':'18px 4px 4px 18px')
              : (isFirst?'4px 18px 18px 18px':'4px 18px 18px 4px')};
            font-size:16px;line-height:1.5;
            box-shadow:0 1px 4px rgba(0,0,0,.15);
            word-break:break-word">
            ${esc(m.text)}
          </div>
          ${isLast?`<div style="font-size:11px;color:var(--mt);margin-top:3px;padding:0 4px">${esc(m.time||'')}</div>`:''}
        </div>
      </div>`;
    });

    el.innerHTML = html;
    el.scrollTop = el.scrollHeight;
  });
}

function sendChat(){
  const txt = val('chat-inp');
  if(!txt?.trim()) return;
  fbPush('chat',{
    uid: CU.uid||CU.id,
    name: CU.name,
    role: CU.role,
    text: txt.trim(),
    time: ts(),
    _ts: Date.now()
  });
  document.getElementById('chat-inp').value='';
}

function renderDocsList(docs){

  return docs.map(d=>`

    <div style="font-size:28px">${icons[d.category]||'📎'}</div>

      <div style="font-size:11px;color:var(--mt)">${esc(d.category)} — ${esc(d.site||'عام')} — ${esc(d.date)}</div>
      ${d.notes?`<div style="font-size:11px;color:var(--mt)">${esc(d.notes)}</div>`:''}
    </div>
    <div style="display:flex;gap:5px">
      <a href="${d.url}" download="${esc(d.name)}" class="btn btn-sm btn-bl">⬇️</a>
      ${CU.role==='manager'?`<button class="btn btn-sm btn-rd" onclick="delDoc('${d.id}')">🗑</button>`:''}
    </div>
  </div>`).join('');
}

function filterDocs(type, btn){
  document.querySelectorAll('.ph ~ div .btn-gy').forEach(b=>b.classList.remove('act'));
  btn.classList.add('act');
  FBDB.ref('cctv/docs').once('value').then(snap=>{
    let docs = snap.val() ? Object.values(snap.val()).sort((a,b)=>(b._ts||0)-(a._ts||0)) : [];
    if(type!=='الكل') docs = docs.filter(d=>d.category===type);
    const el = document.getElementById('docs-list');
    if(el) el.innerHTML = docs.length ? renderDocsList(docs) : '<div style="text-align:center;padding:30px;color:var(--mt)">لا مستندات</div>';
  });
}

function uploadDoc(){
  const name = val('dc-name');
  const file = document.getElementById('dc-file')?.files[0];
  if(!name||!file){ toast('الاسم والملف مطلوبان','err'); return; }
  if(file.size > 2*1024*1024){ toast('الملف كبير جداً (الحد 2MB)','err'); return; }
  toast('⏳ جار الرفع...');
  const reader = new FileReader();
  reader.onload = e=>{
    const id = gid();
    const doc = {
      id, name, url: e.target.result,
      category: val('dc-cat'),
      site: val('dc-site'),
      notes: val('dc-notes'),
      by: CU.name, date: ts(), _ts: Date.now(),
      fileType: file.type, fileSize: Math.round(file.size/1024)+'KB'
    };
    fbSet('docs/'+id, doc);
    logAct('رفع مستند', name+' — '+doc.category);
    closeModal();
    toast('✅ تم رفع المستند');
    pgDocs();
  };
  reader.readAsDataURL(file);
}

function delDoc(id){
  if(!confirm('حذف المستند نهائياً؟')) return;
  fbDel('docs/'+id);
  toast('تم الحذف','err');
  pgDocs();
}

// ═══════════════════════════════════════════════════════
//  💬 فقاعة Messenger
// ═══════════════════════════════════════════════════════
let _bubbleOpen = false;
let _bubbleChatListener = null;
let _lastMsgCount = 0;

function toggleMsgBubble(){
  _bubbleOpen = !_bubbleOpen;
  const panel = document.getElementById('msg-bubble-panel');
  if(panel) panel.classList.toggle('open', _bubbleOpen);
  if(_bubbleOpen){
    hideBubbleBadge();
    loadBubbleChat();
    setTimeout(()=>{ const inp=document.getElementById('bubble-inp'); if(inp) inp.focus(); },200);
  }
}

function loadBubbleChat(){
  const myUid = CU?.uid||CU?.id;
  if(_bubbleChatListener) FBDB.ref('cctv/chat').off('value', _bubbleChatListener);
  _bubbleChatListener = FBDB.ref('cctv/chat').limitToLast(30).on('value', snap=>{
    const msgs = snap.val() ? Object.values(snap.val()).sort((a,b)=>(a._ts||0)-(b._ts||0)) : [];
    const el = document.getElementById('bubble-msgs');
    if(!el) return;

    // إشعار رسائل جديدة
    if(!_bubbleOpen && msgs.length > _lastMsgCount && _lastMsgCount > 0){
      showBubbleBadge(msgs.length - _lastMsgCount);
    }
    _lastMsgCount = msgs.length;

    if(!msgs.length){ el.innerHTML='<div style="text-align:center;color:var(--mt);font-size:13px;padding:20px">لا رسائل</div>'; return; }

    el.innerHTML = msgs.map(m=>{
      const isMe = m.uid === myUid;
      const av = m.name?m.name[0]:'?';
      const avColor = RC[m.role]||'var(--bl)';
      return `<div style="display:flex;flex-direction:${isMe?'row-reverse':'row'};align-items:flex-end;gap:5px;margin-bottom:4px">
        ${!isMe?`<div style="width:26px;height:26px;border-radius:50%;background:${avColor};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0">${av}</div>`:''}
        <div style="max-width:75%">
          ${!isMe?`<div style="font-size:11px;color:${avColor};font-weight:700;margin-bottom:1px;padding-right:4px">${esc(m.name)}</div>`:''}
          <div style="background:${isMe?'linear-gradient(135deg,#0084ff,#0066cc)':'var(--sf)'};color:${isMe?'#fff':'var(--tx)'};
            padding:8px 12px;border-radius:${isMe?'16px 16px 4px 16px':'16px 16px 16px 4px'};
            font-size:14px;line-height:1.4;box-shadow:0 1px 3px rgba(0,0,0,.15);word-break:break-word">
            ${esc(m.text)}
          </div>
          <div style="font-size:10px;color:var(--mt);margin-top:2px;padding:0 4px;text-align:${isMe?'left':'right'}">${esc(m.time||'')}</div>
        </div>
      </div>`;
    }).join('');
    el.scrollTop = el.scrollHeight;
  });
}

function sendBubbleChat(){
  const inp = document.getElementById('bubble-inp');
  const txt = inp?.value?.trim();
  if(!txt) return;
  fbPush('chat',{ uid:CU.uid||CU.id, name:CU.name, role:CU.role, text:txt, time:ts(), _ts:Date.now() });
  inp.value = '';
}

function showBubbleBadge(count){
  const badge = document.getElementById('msg-bubble-badge');
  if(badge){ badge.style.display='flex'; badge.textContent=count>9?'9+':count; }
}
function hideBubbleBadge(){
  const badge = document.getElementById('msg-bubble-badge');
  if(badge){ badge.style.display='none'; badge.textContent=''; }
}

function showMsgBubble(){
  const wrap = document.getElementById('msg-bubble-wrap');
  if(wrap) wrap.style.display='flex';
  loadBubbleChat();
}
function hideMsgBubble(){
  const wrap = document.getElementById('msg-bubble-wrap');
  if(wrap) wrap.style.display='none';
  if(_bubbleChatListener){ FBDB.ref('cctv/chat').off('value',_bubbleChatListener); _bubbleChatListener=null; }
}


// ═══════════════════════════════════════════════════════
//  📦 جرد الموجودات الثابتة في المواقع
// ═══════════════════════════════════════════════════════

function pgSiteInventory(){
  const sites = getVisibleFieldSites();
  if(!sites.length){
    $('page').innerHTML=`<div style="text-align:center;padding:60px;color:var(--mt)">لا مواقع متاحة</div>`;
    return;
  }

  // اختر الموقع الافتراضي
  const selSite = window._invSite || sites[0].id;
  window._invSite = selSite;
  const site = sites.find(s=>s.id===selSite) || sites[0];

  // تحميل نقاط الجرد من Firebase
  FBDB.ref('cctv/siteInventory/'+site.id).once('value').then(snap=>{
    const points = snap.val() ? Object.values(snap.val()).sort((a,b)=>(a.order||0)-(b.order||0)) : [];
    const totalItems = points.reduce((s,pt)=>(s + (pt.items ? Object.values(pt.items).length : 0)), 0);
    const working = points.reduce((s,pt)=>(s + (pt.items ? Object.values(pt.items).filter(i=>i.status==='يعمل').length : 0)), 0);
    const broken  = points.reduce((s,pt)=>(s + (pt.items ? Object.values(pt.items).filter(i=>i.status==='معطل').length : 0)), 0);

    $('page').innerHTML=`
    <div class="ph">
      <div>
        <div class="pt">📦 جرد الموجودات الثابتة</div>
        <div class="ps" style="display:flex;gap:12px;flex-wrap:wrap;margin-top:4px">
          <span>📍 ${points.length} نقطة</span>
          <span>📋 ${totalItems} عنصر</span>
          <span style="color:var(--gn)">✅ ${working} يعمل</span>
          <span style="color:var(--rd)">❌ ${broken} معطل</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${canAccessFault({fieldSiteId:site.id})?`<button class="btn btn-bl" onclick="openAddSitePoint('${site.id}')">+ نقطة</button>`:''}
        <button class="btn btn-gy" onclick="exportSiteInventory('${site.id}','${esc(site.name)}')">⬇️ تصدير</button>
      </div>
    </div>

    <!-- تبويبات المواقع -->
    <div class="tabs" style="margin-bottom:14px">
      ${sites.map(s=>`
        <button class="tb${s.id===site.id?' act':''}" onclick="window._invSite='${s.id}';pgSiteInventory()">
          📍 ${esc(s.name)}
        </button>`).join('')}
    </div>

    <!-- النقاط -->
    <div id="inv-points">
      ${points.length
        ? points.map(pt=>renderSitePoint(pt, site.id)).join('')
        : `<div class="panel" style="text-align:center;padding:50px;color:var(--mt)">
            <div style="font-size:48px">📦</div>
            <div style="margin-top:12px;font-size:17px">لا نقاط بعد — أضف أول نقطة جرد</div>
          </div>`
      }
    </div>`;
  });
}

function renderSitePoint(pt, siteId){
  const items = pt.items ? Object.values(pt.items) : [];
  const working = items.filter(i=>i.status==='يعمل').length;
  const broken  = items.filter(i=>i.status==='معطل').length;
  const maint   = items.filter(i=>i.status==='صيانة').length;
  const canEdit = canAccessFault({fieldSiteId: siteId});
  const pid = 'pt-'+pt.id;

  return `<div class="panel" style="margin-bottom:10px;padding:0;overflow:hidden">
    <!-- هيدر النقطة — قابل للضغط -->
    <div onclick="toggleSitePoint('${pid}')"
      style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;user-select:none">
      <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
        <span id="${pid}-arrow" style="font-size:18px;transition:transform .25s;display:inline-block">▶</span>
        <div>
          <div style="font-weight:700;font-size:16px">📌 ${esc(pt.name)}</div>
          ${pt.desc?`<div style="font-size:12px;color:var(--mt)">${esc(pt.desc)}</div>`:''}
          <div style="display:flex;gap:8px;margin-top:3px;font-size:12px">
            <span style="color:var(--mt)">${items.length} عنصر</span>
            ${working?`<span style="color:var(--gn)">✅ ${working}</span>`:''}
            ${broken?`<span style="color:var(--rd)">❌ ${broken}</span>`:''}
            ${maint?`<span style="color:var(--yl)">🔧 ${maint}</span>`:''}
          </div>
        </div>
      </div>
      <!-- أزرار التحكم -->
      ${canEdit?`<div style="display:flex;gap:5px;flex-shrink:0" onclick="event.stopPropagation()">
        <button class="btn btn-sm btn-bl" onclick="openAddSiteItem('${siteId}','${pt.id}')">+ عنصر</button>
        <button class="btn btn-sm btn-gy" onclick="openEditSitePoint('${siteId}','${pt.id}')">✏️</button>
        <button class="btn btn-sm btn-rd" onclick="delSitePoint('${siteId}','${pt.id}')">🗑️</button>
      </div>`:''}
    </div>
    <!-- عناصر النقطة — مخفية افتراضياً -->
    <div id="${pid}" style="display:none;padding:0 14px 12px;border-top:1px solid var(--br)">
      ${items.length?`
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:10px">
        ${items.map(item=>renderSiteItem(item, siteId, pt.id, canEdit)).join('')}
      </div>`:`<div style="text-align:center;padding:16px;color:var(--mt);font-size:13px">لا عناصر — اضغط "+ عنصر"</div>`}
    </div>
  </div>`;
}

function toggleSitePoint(pid){
  const body  = document.getElementById(pid);
  const arrow = document.getElementById(pid+'-arrow');
  if(!body) return;
  const isOpen = body.style.display !== 'none';
  body.style.display  = isOpen ? 'none' : 'block';
  if(arrow) arrow.style.transform = isOpen ? '' : 'rotate(90deg)';
}

function renderSiteItem(item, siteId, ptId, canEdit){
  const stColors = {'يعمل':'var(--gn)','معطل':'var(--rd)','صيانة':'var(--yl)'};
  const stIcons  = {'يعمل':'✅','معطل':'❌','صيانة':'🔧'};
  const col = stColors[item.status]||'var(--mt)';
  const ico = stIcons[item.status]||'❓';

  return `<div style="display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:10px;padding:10px 12px;border:1px solid var(--br)">
    <!-- صورة مصغرة -->
    ${item.photo?`<img src="${item.photo}" onclick="viewPhoto('${item.photo}')" style="width:44px;height:44px;border-radius:8px;object-fit:cover;cursor:pointer;flex-shrink:0">`
    :`<div style="width:44px;height:44px;border-radius:8px;background:var(--sf);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">📦</div>`}
    <!-- التفاصيل -->
    <div style="flex:1;min-width:0">
      <div style="font-weight:700;font-size:15px">${esc(item.name)}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:3px;font-size:12px;color:var(--mt)">
        <span>الكمية: <b style="color:var(--tx)">${item.qty||1}</b></span>
        ${item.serial?`<span>SN: <b style="color:var(--bl)">${esc(item.serial)}</b></span>`:''}
        <span style="color:${col};font-weight:700">${ico} ${esc(item.status||'—')}</span>
      </div>
      ${item.notes?`<div style="font-size:11px;color:var(--mt);margin-top:2px">${esc(item.notes)}</div>`:''}
    </div>
    <!-- أزرار -->
    ${canEdit?`<div style="display:flex;gap:4px;flex-shrink:0">
      <button class="btn btn-sm btn-gy" onclick="openEditSiteItem('${siteId}','${ptId}','${item.id}')">✏️</button>
      <button class="btn btn-sm btn-rd" onclick="delSiteItem('${siteId}','${ptId}','${item.id}')">🗑️</button>
    </div>`:''}
  </div>`;
}

  <div style="display:flex;flex-direction:column;gap:10px">
    <div class="field"><label>اسم النقطة *</label><input id="sp-name" placeholder="مثال: المدخل الرئيسي، غرفة المراقبة..."></div>

function saveSitePoint(siteId, ptId){
  const name = val('sp-name');
  if(!name){ toast('اسم النقطة مطلوب','err'); return; }
  const id = ptId || gid();
  const data = { id, name, desc: val('sp-desc')||'', order: Date.now(), _ts: Date.now() };

  logAct('نقطة جرد', name);

  toast('✅ تم الحفظ');

function openEditSitePoint(siteId, ptId){
  FBDB.ref('cctv/siteInventory/'+siteId+'/'+ptId).once('value').then(snap=>{

    if(!pt) return;

    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="field"><label>اسم النقطة *</label><input id="sp-name" value="${esc(pt.name)}"></div>
      <div class="field"><label>وصف</label><input id="sp-desc" value="${esc(pt.desc||'')}"></div>
    </div>
    <div class="mft" style="margin-top:14px">
      <button class="btn btn-gy" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-bl" onclick="saveSitePoint('${siteId}','${ptId}')">💾 حفظ</button>
    </div>`);
  });
}

function delSitePoint(siteId, ptId){
  if(!confirm('حذف النقطة وجميع عناصرها؟')) return;
  fbDel('siteInventory/'+siteId+'/'+ptId);
  toast('تم الحذف');

function openAddSiteItem(siteId, ptId){

  <div style="display:flex;flex-direction:column;gap:10px">
    <div class="field"><label>اسم العنصر *</label><input id="si-name" placeholder="كاميرا dome، جهاز قدرة، عاكس كهربائي..."></div>
    <div class="field"><label>الكمية</label><input id="si-qty" type="number" value="1" min="1"></div>
    <div class="field"><label>الرقم التسلسلي</label><input id="si-serial" placeholder="SN-XXXXX"></div>
    <div class="field"><label>الحالة</label>
      <select id="si-status">
        <option value="يعمل">✅ يعمل</option>
        <option value="معطل">❌ معطل</option>
        <option value="صيانة">🔧 صيانة</option>
      </select>
    </div>
    <div class="field"><label>صورة</label>
      <input type="file" id="si-photo" accept="image/*" style="color:var(--tx)">
    </div>
    <div class="field"><label>ملاحظات</label><textarea id="si-notes" rows="2" placeholder="أي ملاحظات..."></textarea></div>
  </div>
  <div class="mft" style="margin-top:14px">
    <button class="btn btn-gy" onclick="closeModal()">إلغاء</button>
    <button class="btn btn-bl" onclick="saveSiteItem('${siteId}','${ptId}')">💾 حفظ</button>
  </div>`);
}

function saveSiteItem(siteId, ptId, itemId){
  const name = val('si-name');
  if(!name){ toast('اسم العنصر مطلوب','err'); return; }
  const file = document.getElementById('si-photo')?.files[0];

  function doSave(photoData){
    const id = itemId || gid();
    const data = {
      id, name,
      qty: parseInt(val('si-qty'))||1,
      serial: val('si-serial')||'',
      status: val('si-status')||'يعمل',
      notes: val('si-notes')||'',
      photo: photoData||'',
      by: CU.name, date: ts(), _ts: Date.now()
    };
    fbSet('siteInventory/'+siteId+'/'+ptId+'/items/'+id, data);
    logAct('جرد ثابت', name+' — '+data.status);
    closeModal();
    toast('✅ تم الحفظ');
    pgSiteInventory();
  }

  if(file){
    if(file.size > 500*1024){ toast('الصورة كبيرة — الحد 500KB','err'); return; }
    const reader = new FileReader();
    reader.onload = e => doSave(e.target.result);
    reader.readAsDataURL(file);
  } else {
    doSave('');
  }
}

function openEditSiteItem(siteId, ptId, itemId){
  FBDB.ref('cctv/siteInventory/'+siteId+'/'+ptId+'/items/'+itemId).once('value').then(snap=>{
    const item = snap.val();
    if(!item) return;
    openModal(`${mhd('✏️ تعديل العنصر')}

      <div class="field"><label>الحالة</label>

    <div class="mft" style="margin-top:14px">
      <button class="btn btn-gy" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-bl" onclick="saveSiteItem('${siteId}','${ptId}','${itemId}')">💾 حفظ</button>
    </div>`);
  });
}

function delSiteItem(siteId, ptId, itemId){
  if(!confirm('حذف هذا العنصر؟')) return;
  fbDel('siteInventory/'+siteId+'/'+ptId+'/items/'+itemId);
  toast('تم الحذف');
  pgSiteInventory();
}

// ── تصدير الجرد ──
function exportSiteInventory(siteId, siteName){
  FBDB.ref('cctv/siteInventory/'+siteId).once('value').then(snap=>{
    const points = snap.val() ? Object.values(snap.val()) : [];
    let csv = '\uFEFF';
    csv += 'الموقع,النقطة,العنصر,الكمية,الرقم التسلسلي,الحالة,ملاحظات,التاريخ\n';
    points.forEach(pt=>{
      const items = pt.items ? Object.values(pt.items) : [];
      items.forEach(item=>{
        csv += [siteName, pt.name, item.name, item.qty||1, item.serial||'', item.status||'', item.notes||'', item.date||'']
          .map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')+'\n';
      });
    });
    const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download='جرد_'+siteName+'_'+new Date().toISOString().split('T')[0]+'.csv';
    a.click(); URL.revokeObjectURL(url);
    toast('✅ تم التصدير');
  });
}

function faultAge(f){
  if(!f._ts) return '';
  const ms = Date.now() - f._ts;
  const h  = Math.floor(ms / 3600000);
  const m  = Math.floor((ms % 3600000) / 60000);
  if(h >= 72) return { txt: Math.floor(h/24)+'ي', color:'#f85149', urgent:true };
  if(h >= 24) return { txt: h+'س', color:'#f85149', urgent:true };
  if(h >= 1)  return { txt: h+'س '+m+'د', color:'#d29922', urgent:false };
  return { txt: m+'د', color:'var(--gn)', urgent:false };
}

function renderFaultChart(){
  const el = document.getElementById('fault-chart');
  if(!el) return;
  // آخر 6 أشهر
  const months = [];
  for(let i=5;i>=0;i--){
    const d = new Date(); d.setMonth(d.getMonth()-i);
    months.push({ y:d.getFullYear(), m:d.getMonth(),
      label: d.toLocaleDateString('ar-IQ',{month:'short'}) });
  }
  const counts = months.map(mo=>
    DB.faults.filter(f=>{
      const d = f._ts ? new Date(f._ts) : null;
      return d && d.getFullYear()===mo.y && d.getMonth()===mo.m;
    }).length
  );
  const resolved = months.map(mo=>
    DB.faults.filter(f=>{
      const d = f._tsResolved ? new Date(f._tsResolved) : null;
      return d && d.getFullYear()===mo.y && d.getMonth()===mo.m;
    }).length
  );
  const max = Math.max(...counts, ...resolved, 1);
  el.innerHTML = `
  <div style="font-size:13px;font-weight:700;color:var(--tx);margin-bottom:10px">📊 الأعطال — آخر 6 أشهر</div>
  <div style="display:flex;align-items:flex-end;gap:8px;height:80px">
    ${months.map((mo,i)=>`
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
      <div style="font-size:10px;color:var(--mt)">${counts[i]||''}</div>
      <div style="width:100%;background:#f8514966;border-radius:4px 4px 0 0;height:${Math.round((counts[i]/max)*64)+4}px;min-height:4px"></div>
      <div style="width:100%;background:#3fb95066;border-radius:4px 4px 0 0;height:${Math.round((resolved[i]/max)*64)+4}px;min-height:4px;margin-top:2px"></div>
      <div style="font-size:10px;color:var(--mt)">${mo.label}</div>
    </div>`).join('')}
  </div>
  <div style="display:flex;gap:12px;margin-top:8px;font-size:11px">
    <span><span style="display:inline-block;width:10px;height:10px;background:#f8514966;border-radius:2px;margin-left:4px"></span>مُبلَّغ</span>
    <span><span style="display:inline-block;width:10px;height:10px;background:#3fb95066;border-radius:2px;margin-left:4px"></span>محلول</span>
  </div>`;
}

async function requestNotifPermission(){
  if(!FBMSG){ toast('FCM غير متاح في هذا المتصفح','warn'); return; }
  try {
    const perm = await Notification.requestPermission();
    if(perm !== 'granted'){ toast('الإشعارات غير مسموحة','warn'); return; }
    toast('⏳ جار تفعيل الإشعارات...','warn');
    // تسجيل service worker من المسار الصحيح داخل المجلد
    let swReg = null;
    try {
      swReg = await navigator.serviceWorker.register('/Cctv-manger/firebase-messaging-sw.js', {scope: '/Cctv-manger/'});
      await navigator.serviceWorker.ready;
    } catch(swErr) {
      console.warn('SW register failed, using default:', swErr);
    }
    const tokenOptions = { vapidKey: VAPID_KEY };
    if(swReg) tokenOptions.serviceWorkerRegistration = swReg;
    const token = await FBMSG.getToken(tokenOptions);
    if(token && CU){
      await fbSet('users/'+CU.uid+'/fcmToken', token);
      toast('✅ الإشعارات مفعّلة');
      console.log('✅ FCM Token:', token);
    } else {
      toast('❌ فشل الحصول على التوكن','err');
      console.warn('No token or CU:', token, CU);
    }
  } catch(e) {
    toast('❌ خطأ: '+e.message,'err');
    console.error('FCM error:', e);
  }
}
