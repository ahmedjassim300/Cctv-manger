<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>CCTV Manager</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CCTV Manager">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{--bg:#0d1117;--sf:#161b22;--br:#30363d;--tx:#e6edf3;--mt:#7d8590;--bl:#58a6ff;--gn:#3fb950;--rd:#f85149;--yl:#d29922;--pu:#bc8cff;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;font-size:17px;}
body { overflow-x: hidden; font-size: 17px; }
::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--br);border-radius:6px;}::-webkit-scrollbar-thumb:hover{background:var(--mt);}

#app{ display: none; flex-direction: column; height: 100vh; max-height: 100vh; overflow: hidden; }
#main { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; background: var(--bg); }
#page { padding: 16px 12px; }

/* ===== SIDEBAR ===== */
#sidebar {
    background: var(--sf);
    border-bottom: 1px solid var(--br);
    box-shadow: 0 2px 8px rgba(0,0,0,.1);
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    flex-shrink: 0;
    overflow-x: auto;
    overflow-y: hidden;
    gap: 10px;
}
.sb-brand { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.sb-brand .logo{ font-size: 18px; font-weight:700; color:var(--bl); white-space: nowrap; }
.sb-brand .sub{ font-size: 10px; color:var(--mt); display: none; }

.sb-user { flex-shrink: 0; }
.sb-ui { display: flex; align-items: center; gap: 8px; background: var(--bg); padding: 4px 8px; border-radius: 20px; }
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:#fff;flex-shrink:0;}
.sb-un{font-size:17px;font-weight:600; white-space: nowrap;}
.sb-ur{font-size:10px; display: none;}

.sb-nav {
    display: flex;
    flex-direction: row;
    gap: 4px;
    flex: 1 1 auto;
    justify-content: center;
}
.nb {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--mt);
    padding: 8px 10px;
    cursor: pointer;
    font-size: 18px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    transition: all .12s;
}
.nb:hover { background: rgba(255,255,255,.04); color: var(--tx); }
.nb.act { color: var(--bl); border-bottom-color: var(--bl); background: rgba(88,166,255,.12); font-weight:700; }
.nb.main { font-size: 17px; font-weight: 600; }
.nb .ic { font-size: 18px; }
.nav-group-label { display:none; }

/* ===== Messenger-style Chat Bubble ===== */
#chat-bubble {
  position: fixed;
  bottom: 90px;
  left: 20px;
  z-index: 2000;
  display: none;
}
#chat-bubble-btn {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, #0084ff, #0099ff);
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(0,132,255,.5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  transition: transform .2s;
  position: relative;
}
#chat-bubble-btn:active { transform: scale(.92); }
#chat-unread-badge {
  position: absolute;
  top: -4px;
  right: -4px;
  background: #f85149;
  color: #fff;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 6px;
  min-width: 18px;
  text-align: center;
  display: none;
}
#chat-popup {
  position: fixed;
  bottom: 160px;
  left: 16px;
  width: calc(100vw - 32px);
  max-width: 380px;
  height: 65vh;
  max-height: 520px;
  background: var(--sf);
  border-radius: 20px;
  box-shadow: 0 8px 40px rgba(0,0,0,.4);
  display: none;
  flex-direction: column;
  z-index: 1999;
  border: 1px solid var(--br);
  overflow: hidden;
  animation: popIn .2s ease;
}
@keyframes popIn {
  from { opacity:0; transform: scale(.92) translateY(20px); }
  to   { opacity:1; transform: scale(1)  translateY(0); }
}
#chat-popup-header {
  background: linear-gradient(135deg, #0084ff, #0066cc);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
#chat-popup-msgs {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
#chat-popup-input {
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  border-top: 1px solid var(--br);
  background: var(--sf);
  flex-shrink: 0;
}
.chat-msg-bubble {
  max-width: 78%;
  padding: 9px 13px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.4;
  word-break: break-word;
}
.chat-msg-me {
  background: #0084ff;
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.chat-msg-other {
  background: var(--bg);
  color: var(--tx);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.chat-msg-name {
  font-size: 11px;
  color: var(--mt);
  margin-bottom: 3px;
  font-weight: 600;
}
.chat-msg-time {
  font-size: 10px;
  opacity: .6;
  margin-top: 3px;
  text-align: left;
}

/* ===== فقاعة Messenger ===== */
#msg-bubble-wrap {
  position: fixed;
  bottom: 90px;
  right: 20px;
  z-index: 2000;
  display: none;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}
#msg-bubble-btn {
  width: 54px; height: 54px;
  border-radius: 50%;
  background: linear-gradient(135deg,#0084ff,#0066dd);
  border: none; cursor: pointer;
  box-shadow: 0 4px 20px rgba(0,132,255,.5);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; transition: transform .2s;
  position: relative;
}
#msg-bubble-btn:active { transform: scale(.92); }
#msg-bubble-badge {
  position: absolute; top: -2px; right: -2px;
  background: var(--rd); color: #fff;
  border-radius: 50%; width: 18px; height: 18px;
  font-size: 11px; font-weight: 700;
  display: none; align-items: center; justify-content: center;
}
#msg-bubble-panel {
  width: 300px;
  max-height: 420px;
  background: var(--sf);
  border: 1px solid var(--br);
  border-radius: 18px;
  box-shadow: 0 8px 32px rgba(0,0,0,.3);
  display: none;
  flex-direction: column;
  overflow: hidden;
}
#msg-bubble-panel.open { display: flex; }

/* ===== شبكة المربعات في لوحة التحكم ===== */
.dash-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 0 16px 24px; }
.dash-tile {
    background: var(--sf);
    border: 1px solid var(--br);
    border-radius: 20px;
    padding: 26px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    transition: all .15s;
    text-align: center;
    min-height: 110px;
    position: relative;
}
.dash-tile:active { transform: scale(.97); background: rgba(88,166,255,.1); }
.dash-tile:hover { background: rgba(88,166,255,.08); border-color: var(--bl); }
.dash-tile.act { background: rgba(88,166,255,.14); border-color: var(--bl); }
.dash-tile .t-ic { font-size: 36px; }
.dash-tile .t-lb { font-size: 18px; color: var(--tx); font-weight: 600; line-height: 1.3; }
.dash-tile .t-badge { position: absolute; top: 10px; left: 10px; font-size: 11px; background: var(--rd); color: #fff; border-radius: 10px; padding: 2px 7px; font-weight: 700; }

/* ===== Light Theme ===== */
body.light {
    --bg: #f0f2f5;
    --sf: #ffffff;
    --br: #d0d7de;
    --tx: #1c2128;
    --mt: #636c76;
    --bl: #0969da;
    --gn: #1a7f37;
    --rd: #cf222e;
    --yl: #9a6700;
    --pu: #8250df;
}

.sb-bot { flex-shrink: 0; }
.sb-bot .btn { padding: 6px 12px; font-size: 12px; }

/* ===== MEDIA QUERY للهواتف ===== */
@media (max-width: 768px) {
    #page { padding: 12px; }
    #sidebar { padding: 4px 8px; gap: 5px; }
    .sb-brand .logo { font-size: 18px; }
    .sb-ui { padding: 2px 6px; }
    .av { width: 24px; height: 24px; font-size: 11px; }
    .sb-un { font-size: 11px; max-width: 70px; overflow: hidden; text-overflow: ellipsis; }
    .nb { padding: 7px 8px; font-size: 18px; gap: 4px; }
    .nb .ic { font-size: 18px; }
    .sb-bot .btn { padding: 4px 8px; font-size: 11px; }
    .cg { grid-template-columns: 1fr 1fr; gap: 8px; }
    .sc { padding: 12px; gap: 10px; }
    .si { width: 40px; height: 40px; font-size: 20px; }
    .sn { font-size: 26px; }
    .tw { overflow-x: auto; }
    table { min-width: 600px; }
    .fg { grid-template-columns: 1fr; }
    .fr { flex-direction: column; }
    .fr input, .fr select { width: 100%; }
    .tabs { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 8px; }
    .tb { white-space: nowrap; }
    .ph { flex-direction: column; align-items: flex-start; gap: 8px; }
    .ph > div { width: 100%; }
    .ph > div:last-child { display: flex; width: 100%; gap: 8px; }
    .ph > div:last-child button { flex: 1; }
    .lbox { width: 90%; padding: 24px; }
}

/* باقي الأنماط */
#ls{height:100vh;display:flex;align-items:center;justify-content:center; background: var(--bg);}
.lbox{background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:36px;width:390px; max-width: 95%;}
.llogo{text-align:center;margin-bottom:28px;}
.llogo .ico{font-size:48px;}
.llogo h1{font-size:26px;color:var(--bl);margin-top:10px;}
.llogo p{color:var(--mt);font-size:17px;margin-top:4px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:16px;color:var(--mt);margin-bottom:6px;font-weight:700;letter-spacing:.2px;}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1.5px solid var(--br);border-radius:10px;padding:12px 14px;color:var(--tx);font-size:17px;outline:none;direction:rtl;font-family:inherit;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(88,166,255,.15);}
.field textarea{resize:vertical;min-height:70px;}
.ckf{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
.ckf input[type=checkbox]{width:16px;height:16px;flex-shrink:0;cursor:pointer;}
.ckf label{font-size:17px;color:var(--tx);cursor:pointer;}
.btn{border:none;border-radius:12px;padding:11px 20px;font-size:18px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s;}
.btn:hover{filter:brightness(1.15);}.btn:active{filter:brightness(.9);}
.btn-bl{background:var(--bl);color:#000;}.btn-gn{background:var(--gn);color:#000;}
.btn-rd{background:#f8514922;border:1px solid #f8514944;color:var(--rd);}
.btn-gy{background:var(--br);color:var(--tx);}
.btn-yl{background:#d2992222;border:1px solid #d2992244;color:var(--yl);}
.btn-pu{background:#bc8cff22;border:1px solid #bc8cff44;color:var(--pu);}
.btn-or{background:#ff7b0022;border:1px solid #ff7b0044;color:#ff7b00;}
.btn-sm{padding:9px 16px;font-size:16px;}.btn-fw{width:100%;padding:11px;font-size:17px;}
.ebox{background:#f8514918;border:1px solid #f8514944;border-radius:7px;padding:9px 12px;color:var(--rd);font-size:17px;text-align:center;margin-bottom:10px;}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;padding:0 4px;}
.pt{font-size:26px;font-weight:700;}.ps{font-size:18px;color:var(--mt);margin-top:3px;}
.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:20px;}
.sc{background:var(--sf);border:1px solid var(--br);border-radius:14px;padding:18px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.si{font-size:26px;width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sn{font-size:36px;font-weight:800;line-height:1;}.sl{font-size:18px;color:var(--mt);margin-top:3px;}
.tw{background:var(--sf);border:1px solid var(--br);border-radius:10px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 13px;text-align:right;font-size:12px;color:var(--mt);font-weight:600;background:var(--bg);white-space:nowrap;}
td{padding:10px 13px;border-top:1px solid var(--br);vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,.025);}
.tm{font-weight:600;}.ts{font-size:12px;color:var(--mt);margin-top:2px;}
.erow td{text-align:center;padding:40px;color:var(--mt);}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.panel{background:var(--sf);border:1px solid var(--br);border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.ptitle{font-size:17px;font-weight:700;color:var(--mt);margin-bottom:14px;}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--br);}
.tb{padding:6px 14px;border-radius:20px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .12s;}
.tb.act{background:var(--bl);color:#000;}.tb:not(.act){background:var(--br);color:var(--mt);}
.fr{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:14px;}
.fr input,.fr select{flex:1;min-width:130px;background:var(--bg);border:1px solid var(--br);border-radius:7px;padding:8px 11px;color:var(--tx);font-size:17px;outline:none;direction:rtl;font-family:inherit;}
.fr input:focus,.fr select:focus{border-color:var(--bl);}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:200;padding:16px;}
.modal-ov.open{display:flex;}
.mbx{background:var(--sf);border:1px solid var(--br);border-radius:20px;padding:24px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.3);}
.mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.mhd h3{font-size:18px;font-weight:700;}
.xb{background:none;border:none;color:var(--mt);font-size:26px;cursor:pointer;line-height:1;padding:0;}
.mft{display:flex;gap:9px;justify-content:flex-end;margin-top:20px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fg .s2{grid-column:1/-1;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gn);color:#000;padding:12px 24px;border-radius:20px;font-size:17px;font-weight:700;z-index:9999;display:none;box-shadow:0 6px 24px rgba(0,0,0,.3);}
.sec{font-size:12px;font-weight:700;color:var(--mt);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--br);}
.dac{display:flex;justify-content:space-between;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12px;}
.dac:hover{background:rgba(255,255,255,.05);}
.ri{padding:9px 0;border-bottom:1px solid var(--br);display:flex;justify-content:space-between;align-items:center;gap:8px;}
.ri:last-child{border-bottom:none;}
.fc{background:var(--sf);border:1px solid var(--br);border-radius:10px;padding:16px;margin-bottom:10px;border-right-width:4px;}
.fst-btn{width:100%;text-align:right;margin-bottom:4px;font-size:12px;padding:6px 10px;}
.ni{background:var(--sf);border:1px solid var(--br);border-right-width:3px;border-radius:9px;padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.ni.rd{opacity:.55;}
.ucards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.uc{background:var(--sf);border:1px solid var(--br);border-radius:10px;padding:16px;border-top-width:3px;}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;}
.pi{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:7px;font-size:17px;}
.pi input[type=checkbox]{width:15px;height:15px;cursor:pointer;flex-shrink:0;}
.imp-area{border:2px dashed var(--br);border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:border-color .2s;}
.imp-area:hover{border-color:var(--bl);}
.tch{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--bg);border:1px solid var(--br);border-radius:20px;font-size:12px;margin:3px;}
.task-card{background:var(--sf);border:1px solid var(--br);border-radius:10px;padding:14px;margin-bottom:8px;border-right:3px solid var(--bl);}
#cam-map{height:500px;border-radius:10px;border:1px solid var(--br);margin-bottom:16px;z-index:1;}
.dir-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;max-width:160px;}
.dir-btn{padding:9px;border:1px solid var(--br);border-radius:7px;background:var(--bg);color:var(--mt);cursor:pointer;font-size:17px;text-align:center;line-height:1;}
.dir-btn.sel{background:#58a6ff22;border-color:var(--bl);color:var(--bl);}
.leaflet-popup-content-wrapper{background:#161b22!important;border:1px solid #30363d!important;color:#e6edf3!important;border-radius:10px!important;}
.leaflet-popup-tip{background:#161b22!important;}

/* أنماط جديدة لإدارة الصلاحيات */
.perms-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    background: var(--bg);
    border-radius: 12px;
    font-size: 11px;
    color: var(--mt);
    border: 1px solid var(--br);
    margin: 2px;
}
.perms-badge.allowed {
    background: #3fb95022;
    border-color: #3fb95044;
    color: var(--gn);
}
.user-selector {
    max-height: 200px;
    overflow-y: auto;
    background: var(--bg);
    border-radius: 7px;
    padding: 10px;
    border: 1px solid var(--br);
}
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>

<div id="ls">
  <div class="lbox">
    <div class="llogo"><div class="ico">📹</div><h1>CCTV Manager</h1><p>نظام إدارة كاميرات المراقبة</p></div>
    <div id="lerr" class="ebox" style="display:none"></div>
    <div class="field"><label>البريد الإلكتروني</label><input id="lu" type="email" placeholder="user@example.com" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="field"><label>كلمة المرور</label><input id="lp" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn btn-bl btn-fw" id="login-btn" onclick="doLogin()">تسجيل الدخول</button>
    <div id="lload" style="display:none;text-align:center;margin-top:12px;color:var(--mt);font-size:17px">⏳ جار التحقق...</div>
  </div>
</div>

<div id="app">
  <!-- هيدر بسيط -->
  <div id="sidebar" style="display:flex;align-items:center;justify-content:space-between;padding:8px 14px;gap:8px">
    <!-- يسار: أفاتار + اسم -->
    <div style="display:flex;align-items:center;gap:8px;flex:1">
      <div class="av" id="sav" onclick="openUserMenu()" style="cursor:pointer;width:38px;height:38px;font-size:18px;flex-shrink:0"></div>
      <div style="min-width:0">
        <div class="sb-un" id="snm" style="font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px"></div>
        <div class="sb-ur" id="srl" style="font-size:11px;display:block"></div>
      </div>
    </div>
    <!-- وسط: شعار -->
    <div class="logo" style="font-size:17px;font-weight:700;color:var(--bl);flex-shrink:0">📹 CCTV</div>
    <!-- يمين: أزرار -->
    <div style="display:flex;align-items:center;gap:4px;flex:1;justify-content:flex-end">

  const site = DB.fieldSites.find(s=>s.id===fieldSiteId);

function doLogin(){
  const email = val('lu'), pw = $('lp').value;
  if(!email||!pw){ const e=$('lerr'); e.textContent='أدخل البريد وكلمة المرور'; e.style.display='block'; return; }
  _loginAttempted = true;
  const btn=$('login-btn');
  btn.disabled=true;
  btn.textContent='⏳ جار التحقق...';
  $('lerr').style.display='none';
  FBAUTH.signInWithEmailAndPassword(email,pw).catch(err=>{
    const msgs={
      'auth/user-not-found':'❌ البريد غير موجود',
      'auth/wrong-password':'❌ كلمة المرور خاطئة',
      'auth/invalid-email':'❌ البريد غير صحيح',
      'auth/too-many-requests':'⛔ محاولات كثيرة، انتظر قليلاً',
      'auth/network-request-failed':'❌ لا يوجد اتصال بالإنترنت',
      'auth/invalid-credential':'❌ البريد أو كلمة المرور خاطئة',
      'auth/user-disabled':'⛔ الحساب معطّل'
    };
    const e=$('lerr');
    e.textContent = msgs[err.code] || ('❌ ' + err.code);
    e.style.display = 'block';
    e.style.opacity = '1';
    const b=$('login-btn');
    b.disabled=false;
    b.textContent='تسجيل الدخول';
    console.error('Login error:', err.code, err.message);
  });
}

function doLogout(){
  _isLoggingOut = true;
  _loginAttempted = false;
  stopGPSTracking();
  const fab = document.getElementById('quick-fab');
  if(fab) fab.style.display='none';
  hideMsgBubble();
  // تحديث حالة الفني كـ offline
  if(CU&&(CU.role==='field'||CU.role==='technician')){
    try{ fbUpdate('techLocations/'+(CU.uid||CU.id),{online:false}); }catch(e){}
  }
  try{ FBDB.ref('cctv').off(); }catch(e){}
  CU=null; PAGE='';
  FBAUTH.signOut().then(()=>{
    _isLoggingOut = false;
    $('app').style.display='none';
    $('ls').style.display='flex';
    $('lu').value=''; $('lp').value='';
    const btn=$('login-btn');
    btn.disabled=false;
    btn.textContent='تسجيل الدخول';
    $('lload').style.display='none';
    // لا نمسح lerr هنا — قد تحتوي على رسالة خطأ مهمة
  });
}

// ── onAuthStateChanged: بعد تسجيل الدخول بنجاح ──
let _loginAttempted = false;
let _isLoggingOut = false;
// تحميل الثيم عند البدء
loadTheme();
loadBranding();

FBAUTH.onAuthStateChanged(function(fbUser){
  if(_isLoggingOut) return; // تجاهل أي حدث أثناء تسجيل الخروج
  if(!fbUser){
    const btn=$('login-btn');
    if(btn){ btn.disabled=false; btn.textContent='تسجيل الدخول'; }
    _loginAttempted = false;
    return;
  }
  console.log('Auth OK, uid:', fbUser.uid, 'email:', fbUser.email);
  // جلب بيانات المستخدم من قاعدة البيانات
  FBDB.ref('cctv/users/'+fbUser.uid).once('value').then(snap=>{
    console.log('DB user data:', snap.val());
    let userData=snap.val();
    if(!userData){
      // إذا كان أول مستخدم (المدير) أضف بياناته تلقائياً
      FBDB.ref('cctv/users').once('value').then(allSnap=>{
        const allUsers = allSnap.val();
        const isFirst = !allUsers || Object.keys(allUsers).length===0;
        if(isFirst){
          // أول مستخدم يسجل دخول يصبح مديراً تلقائياً
          const newUser = {
            uid: fbUser.uid,
            email: fbUser.email,
            name: fbUser.email.split('@')[0],
            role: 'manager',
            active: true,
            perms: null,
            createdAt: new Date().toLocaleString('ar-IQ')
          };
          FBDB.ref('cctv/users/'+fbUser.uid).set(newUser).then(()=>{
            CU={...newUser};
            $('lload').style.display='none';
            $('lerr').style.display='none';
            $('ls').style.display='none';
            $('app').style.display='flex';
            const av=$('sav');
            av.textContent=CU.name[0]; av.style.background=RC[CU.role]||'#f85149';
            $('snm').textContent=CU.name;
            $('srl').textContent=ROLES[CU.role]; $('srl').style.color=RC[CU.role];
            fbInitDB();
            fbStartSync();
          });
        } else {
          const e=$('lerr');
          e.textContent='❌ حسابك غير مسجّل في النظام. تواصل مع المدير';
          e.style.display='block';
          e.style.opacity='1';
          FBAUTH.signOut();
          console.error('User not in DB, uid:', fbUser.uid);
        }
      });
      return;
    }
    if(!userData.active){
      const e=$('lerr');
      e.textContent='⛔ حسابك معطّل، تواصل مع المدير';
      e.style.display='block';
      e.style.opacity='1';
      FBAUTH.signOut();
      console.error('User disabled:', fbUser.uid);
      return;
    }
    CU={...userData, uid:fbUser.uid, email:fbUser.email};
    $('lload').style.display='none';
    $('lerr').style.display='none';
    $('ls').style.display='none';
    $('app').style.display='flex';
    const av=$('sav');
    av.textContent=CU.name[0]; av.style.background=RC[CU.role]||'#58a6ff';
    $('snm').textContent=CU.name;
    $('srl').textContent=ROLES[CU.role]||CU.role; $('srl').style.color=RC[CU.role]||'#58a6ff';
    // تهيئة قاعدة البيانات إذا كانت فارغة (أول دخول)
    fbInitDB();
    // بدء المزامنة الفورية
    fbStartSync();
    // إظهار زر الويدجت العائم
    const fab = document.getElementById('quick-fab');
    if(fab) fab.style.display='block';
    // إظهار فقاعة الدردشة
    showMsgBubble();
    // طلب إذن الإشعارات
    setTimeout(requestNotifPermission, 2000);
    // طلب إذن GPS
    setTimeout(requestGPSPermission, 4000);

    // تحقق من الصيانة المتأخرة
    setTimeout(()=>{
      const today=new Date();
      const overdue=(DB.maintain||[]).filter(t=>!t.done&&new Date(t.dueDate)<today);
      if(overdue.length&&CU.role==='manager'){
        localNotif('🔔 تذكير صيانة','يوجد '+overdue.length+' مهمة صيانة متأخرة');
      }
    }, 3000);
  }).catch(err=>{
    doLogout();
    const e=$('lerr'); e.textContent='❌ خطأ: '+err.message; e.style.display='block';
  });
});

// ═══════════════════════════════════════════════════════
//  FIREBASE INIT — تهيئة البيانات الأولية
// ═══════════════════════════════════════════════════════
function fbInitDB(){
  FBDB.ref('cctv/sites').once('value').then(snap=>{
    if(!snap.exists()){
      // إنشاء المواقع الافتراضية مع ترتيب رقمي
      const mainSite = 'المستودع المركزي';
      fbSet('sites/000_main', mainSite);
      fbSet('sites/001_site', 'مستودع البصرة');
      fbSet('sites/002_site', 'مستودع الموصل');
      fbSet('mainSite', mainSite);
      fbSet('inv/'+fbKey(mainSite)+'/___init',{___init:true});
      fbSet('inv/'+fbKey('مستودع البصرة')+'/___init',{___init:true});
      fbSet('inv/'+fbKey('مستودع الموصل')+'/___init',{___init:true});
    }
  });
  // تحديث uid في بيانات المستخدم إذا كان ناقصاً
  if(CU && CU.uid){
    FBDB.ref('cctv/users/'+CU.uid+'/uid').once('value').then(s=>{
      if(!s.exists()) fbSet('users/'+CU.uid+'/uid', CU.uid);
    });
    FBDB.ref('cctv/users/'+CU.uid+'/email').once('value').then(s=>{
      if(!s.exists() && CU.email) fbSet('users/'+CU.uid+'/email', CU.email);
    });
  }
}

// ═══════════════════════════════════════════════════════
//  FIREBASE SYNC — مزامنة فورية مع قاعدة البيانات
// ═══════════════════════════════════════════════════════
function fbStartSync(){
  // إذا offline — حمّل البيانات المحلية
  if(!navigator.onLine){ loadLocalDB(); }

  FBDB.ref('cctv').on('value', snap=>{
    const data=snap.val()||{};

    // sites
    // sites مخزنة كـ {key: name} — Firebase يرتبها أبجدياً بالـ key
    const mainSiteName = data.mainSite || 'المستودع المركزي';
    if(data.sites){
      const raw = data.sites;
      if(Array.isArray(raw)){
        DB.sites = raw.filter(s=>typeof s==='string');
      } else {
        // ترتيب حسب الـ key لضمان الرئيسي أولاً (000_main يجي قبل أي رقم آخر)
        const sortedEntries = Object.entries(raw)
          .sort((a,b)=>a[0].localeCompare(b[0]))
          .filter(([k,v])=>typeof v==='string');
        DB.sites = sortedEntries.map(([k,v])=>v);
        window._sitesKeys = {}; // {siteName: firebaseKey}
        sortedEntries.forEach(([k,v])=>{ window._sitesKeys[v]=k; });
      }
    } else {
      DB.sites = [mainSiteName];
    }
    // ضمان أن الرئيسي أول دائماً
    if(!DB.sites.length) DB.sites = [mainSiteName];
    if(DB.sites[0] !== mainSiteName){
      DB.sites = [mainSiteName, ...DB.sites.filter(s=>s!==mainSiteName)];
    }
    DB.mainSite = data.mainSite || DB.sites[0];

    // inventory
    DB.inv={};
    DB.sites.forEach(s=>DB.inv[s]=[]);
    if(data.inv){
      Object.entries(data.inv).forEach(([k,items])=>{
        const siteName=decodeURIComponent(k.replace(/_dot_/g,'.').replace(/_sl_/g,'/'));
        if(!DB.inv[siteName]) DB.inv[siteName]=[];
        Object.values(items).forEach(item=>{ if(!item.___init) DB.inv[siteName].push(item); });
      });
    }

    // collections
    DB.moves       = data.moves       ? Object.values(data.moves).sort((a,b)=>(b._ts||0)-(a._ts||0)) : [];
    DB.faults      = data.faults      ? Object.values(data.faults) : [];
    // فلترة الإشعارات حسب صلاحيات المستخدم
    const allNotifs = data.notifs ? Object.values(data.notifs).sort((a,b)=>(b._ts||0)-(a._ts||0)) : [];
    const myUid = CU?.uid||CU?.id;
    DB.notifs = allNotifs.filter(n=>{
      if(!CU || CU.role==='manager' || CU.role==='viewer') return true; // المدير والسيد يريان الكل
      if(!n.allowedUsers) return true; // إشعار عام قديم
      if(n.allowedUsers.includes('all')) return true; // إشعار عام
      if(n.allowedUsers.includes('manager_only')) return false; // للمدير فقط
      return n.allowedUsers.includes(myUid); // فقط المسموح لهم
    });
    DB.invoices    = data.invoices    ? Object.values(data.invoices) : [];
    DB.customTypes = data.customTypes || {};
    DB.fieldSites  = data.fieldSites
      ? Object.values(data.fieldSites).map(fs=>({...fs, cameras:fs.cameras?Object.values(fs.cameras):[]}))
      : [];
    DB.users       = data.users       ? Object.values(data.users) : [];
    DB.actlog      = data.actlog      ? Object.values(data.actlog).sort((a,b)=>(b._ts||0)-(a._ts||0)).slice(0,200) : [];
    DB.maintain    = data.maintain    ? Object.values(data.maintain).sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate)) : [];

    // تحديث المستخدم الحالي إذا تغيرت بياناته
    if(CU && data.users && data.users[CU.uid]){
      const updated=data.users[CU.uid];
      if(!updated.active){ doLogout(); return; }
      CU={...CU,...updated};
    }

    if(!ISITE||!DB.sites.includes(ISITE)) ISITE=DB.sites[0]||'';
    try{ buildNav(); checkAutoRefresh(); autoBackupCheck(); cacheLocalDB(data); }catch(e){}
    if(!PAGE) { try{ go('dashboard'); }catch(e){} }
    else { try{ go(PAGE); }catch(e){} }
  }, err=>{
    console.error('Firebase sync error:', err);
    toast('❌ خطأ في الاتصال بقاعدة البيانات','err');
  });
}

window.ISTS_SITE='';

function renderInvRows(isMain,allItems,items,AT){
  const isMainV=isMain;
  let showItems=isMainV
    ? allItems.filter(item=>{
        const q=ISQ.toLowerCase();
        const ok=!q||[item.name,item.serial,item.model,item.mfr].some(v=>v?.toLowerCase().includes(q));
        const sf=window.ISTS_SITE||'';
        return ok&&(!ITYP||item.type===ITYP)&&(!ISTS||item.status===ISTS)&&(!sf||item.currentSite===sf);
      })
    : items;
  if(!showItems.length) return `<tr class="erow"><td colspan="9">لا توجد عناصر مطابقة</td></tr>`;
  return showItems.map((item)=>{
    const realSite=item.currentSite||ISITE;
    const realIdx=(DB.inv[realSite]||[]).indexOf(item);
    return `<tr>
      <td style="white-space:nowrap">
        <span style="font-size:17px">${AT[item.type]?.icon||'🔧'}</span>
        <span style="font-size:11px;color:var(--mt);margin-right:5px">${AT[item.type]?.label||item.type}</span>
      </td>
      <td><div class="tm">${esc(item.name||item.serial||'—')}</div>
      ${item.name&&item.serial?`<div class="ts">${esc(item.serial)}</div>`:''}</td>
      <td><div>${esc(item.model||'—')}</div><div class="ts">${esc(item.mfr||'')}</div></td>
      <td style="font-size:12px;color:var(--mt);max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(itemDet(item))}</td>
      <td>${badge(item.status)}</td>
      ${isMainV?`<td><span style="font-size:11px;color:var(--mt)">${esc(realSite)}</span></td>`:''}
      <td style="font-size:12px;color:var(--mt)">${esc(item.addedBy||'')}</td>
      ${p('addItem')?`<td><div style="display:flex;gap:4px;flex-wrap:nowrap">
        ${!isMainV?`<button class="btn btn-sm ${item.status==='warehouse'?'btn-bl':'btn-gn'}" onclick="openMoveItem(${realIdx},'${realSite}')">
          ${item.status==='warehouse'?'↑ صرف':'↓ إيداع'}</button>`:''}
        ${!isMainV&&item.status==='warehouse'?`<button class="btn btn-sm btn-pu" title="ترحيل" onclick="openTransferItem(${realIdx},'${realSite}')">🔁</button>`:''}
        <button class="btn btn-sm btn-gy" onclick="openEditItemAt(${realIdx},'${realSite}')">✏️</button>
        ${item.status!=='maintenance'?`<button class="btn btn-sm btn-yl" onclick="setMaintAt(${realIdx},'${realSite}')">🔧</button>`:''}
        <button class="btn btn-sm btn-rd" onclick="delItemAt(${realIdx},'${realSite}')">🗑</button>
      </div></td>`:''}
    </tr>`;
  }).join('');
}

function itemDet(i){
  if(i.type==='camera')    return `${i.cT||''} | ${i.ln||1} عدسة | ${i.an||''}°${i.rs?' | '+i.rs:''}`;
  if(i.type==='nvr')       return `${i.ch||''} قناة${i.st?' | '+i.st:''}${i.ip?' | '+i.ip:''}`;
  if(i.type==='switch_dev')return `${i.po||''} بورت | ${i.sw||''}${i.poe?' | POE':''}${i.sp?' | '+i.sp:''}`;
  if(i.type==='wireless')  return `${i.fq||''} | ${i.pr||''} | مدى:${i.rg||''} | TX:${i.tx||''}`;
  if(i.type==='cable_f')   return `${i.le||''} ${i.un||'متر'}${i.ft?' | '+i.ft:''} | ${i.rl||1} لفة`;
  if(i.type==='cable_c')   return `${i.le||''} ${i.un||'متر'}${i.ca?' | '+i.ca:''} | ${i.rl||1} لفة`;
  if(i.type==='sfp')       return `${i.sT||''}${i.sp?' | '+i.sp:''}${i.rg?' | '+i.rg:''}`;
  if(i.type==='tower')     return `ارتفاع:${i.ht||''}م${i.tt?' | '+i.tt:''}`;
  if(i.type==='converter') return `${i.vi||''} → ${i.vo||''}${i.am?' '+i.am+'A':''}`;
  return i.dc||'';
}

function openAddItem(){ _ei=-1; _es=isMainSite(ISITE)?DB.mainSite:ISITE; _eit=null; showItemForm(null); }
function openEditItem(i){ _ei=i; _es=ISITE; _eit=DB.inv[ISITE][i]; showItemForm(_eit); }

function openMoveItem(i,site){
  const s=site||ISITE;

  const isOut=item.status==='warehouse';
  const dests=isOut?DB.sites.filter(x=>x!==s):DB.sites;
  openModal(`${mhd(isOut?'🔼 صرف من المخزن':'🔽 إيداع في المخزن')}
  <div style="background:var(--bg);border-radius:8px;padding:12px;margin-bottom:16px">
    <div style="font-weight:700">${allT()[item.type]?.icon} ${esc(item.name||item.serial||'—')}</div>
    <div style="font-size:12px;color:var(--mt);margin-top:4px">${esc([item.serial,item.model,item.mfr].filter(Boolean).join(' | '))}</div>
    <div style="margin-top:8px">${badge(item.status)}</div>
  </div>
  <div class="field"><label>${isOut?'الموقع الوجهة':'إيداع في موقع'}</label>
    <select id="mds">${dests.map(d=>`<option>${esc(d)}</option>`).join('')}</select></div>

}

function confirmMove(i,src,isOut){
  const item=DB.inv[src][i], dest=val('mds'), notes=val('mnt');
  if(!item){ closeModal(); return; }
  fbPush('moves',{name:(allT()[item.type]?.icon||'')+' '+(item.name||item.serial||''),
    dir:isOut?'out':'in',from:src,to:dest,by:CU.name,date:ts(),notes,_ts:Date.now()});
  if(isOut){
    fbDel('inv/'+fbKey(src)+'/'+item.id);
    fbSet('inv/'+fbKey(dest)+'/'+item.id,{...item,status:'deployed',currentSite:dest});
  } else {
    fbSet('inv/'+fbKey(src)+'/'+item.id,{...item,status:'warehouse',currentSite:src});
  }
  pushN((isOut?'🔼 صرف':'🔽 إيداع')+' — '+src+' → '+dest);
  closeModal(); toast(isOut?'تم الصرف':'تم الإيداع');
}

function confirmBulkTransfer(src){
  const avail=(DB.inv[src]||[]).filter(i=>i.status==='warehouse');
  const note=val('trnote')||'ترحيل للمستودع الرئيسي';
  const dest=DB.mainSite;
  let count=0;
  avail.forEach((it,i)=>{
    const cb=document.getElementById('tr'+i);
    if(cb&&cb.checked){
      fbDel('inv/'+fbKey(src)+'/'+it.id);
      fbSet('inv/'+fbKey(dest)+'/'+it.id,{...it,currentSite:dest});
      fbPush('moves',{name:'🔁 '+(allT()[it.type]?.icon||'')+' '+(it.name||it.serial||''),
        dir:'transfer',from:src,to:dest,by:CU.name,date:ts(),notes:note,_ts:Date.now()});
      count++;
    }
  });
  pushN('🔁 ترحيل '+count+' مادة من '+src+' للمستودع الرئيسي');
  closeModal(); toast('✅ تم ترحيل '+count+' مادة');
}

function onFaultSiteChange(){
  const sel = document.getElementById('floc');
  const siteId = sel?.value;
  const ptSel = document.getElementById('fpt');
  if(!ptSel) return;
  ptSel.innerHTML = '<option value="">— اختر النقطة/الكاميرا —</option>';
  if(!siteId) return;
  const site = DB.fieldSites.find(s=>s.id===siteId);
  if(!site) return;
  // أضف الكاميرات
  if(site.cameras && site.cameras.length){
    const grp = document.createElement('optgroup');
    grp.label = '📷 الكاميرات';
    site.cameras.forEach((c,i)=>{
      const opt = document.createElement('option');
      opt.value = c.name||c.serial||('كاميرا '+(i+1));
      opt.textContent = opt.value + (c.installDesc?' — '+c.installDesc:'');
      grp.appendChild(opt);
    });
    ptSel.appendChild(grp);
  }
  // أضف نقاط الجرد من siteInventory
  const invData = DB.siteInventory && DB.siteInventory[siteId];
  if(invData){
    const pts = Object.values(invData);
    if(pts.length){
      const grp2 = document.createElement('optgroup');
      grp2.label = '📌 النقاط';
      pts.forEach(pt=>{
        const opt = document.createElement('option');
        opt.value = pt.name;
        opt.textContent = pt.name;
        grp2.appendChild(opt);
      });
      ptSel.appendChild(grp2);
    }
  }
  // تحديث اسم الموقع في floc
  const selOpt = sel.options[sel.selectedIndex];
  if(selOpt) sel.setAttribute('data-selected-name', selOpt.getAttribute('data-name')||selOpt.text);
}

function onFaultPointChange(){
  const ptSel = document.getElementById('fpt');
  const ptCustom = document.getElementById('fpt-custom');
  if(ptCustom) ptCustom.style.display = (ptSel?.value===''||!ptSel?.value) ? 'block' : 'none';
}

function saveFault(){
  const loc=val('floc');
  const ptSel=val('fpt'), ptCustom=val('fpt-custom');
  const pt = ptSel && ptSel!=='' ? ptSel : ptCustom;
  const rsn=val('frsn');
  if(!loc||!pt||!rsn){ toast('الموقع والنقطة والسبب مطلوبة','err'); return; }
  
  const visibleSiteNames = getVisibleFieldSites().map(s => s.name);
  if(!visibleSiteNames.includes(loc)) {
    toast('هذا الموقع غير متاح لك', 'err');
    return;
  }
  
  // إيجاد الموقع الميداني المرتبط
  // استخرج اسم الموقع من الـ select
  const flocEl = document.getElementById('floc');
  const locName = flocEl ? (flocEl.options[flocEl.selectedIndex]?.getAttribute('data-name')||loc) : loc;
  const relatedSite = DB.fieldSites.find(s=>s.id===loc||s.name===loc||s.name===locName);
  const locFinal = relatedSite?.name || locName || loc;
  fbPush('faults',{
    location:locFinal,pointId:pt,camSN:val('fsn'),reason:rsn,
    desc:val('fdsc'),priority:val('fpri'),by:CU.name,date:ts(),status:'open',log:[],
    fieldSiteId: relatedSite?.id||null
  });
  logAct('إضافة عطل', loc+' — '+pt+' — '+rsn);
  if(relatedSite){
    pushFieldN('🔴 عطل جديد في '+loc+' — النقطة: '+pt, relatedSite.id, 'error');
  } else {
    pushN('🔴 عطل جديد في '+loc+' — النقطة: '+pt,'error');
  }
  closeModal(); toast('تم إرسال البلاغ');
}

function updFaultStatus(f, ri, status){
  // تحقق من صلاحية الوصول للموقع
  if(!canAccessFault(f)){ toast('⛔ لا صلاحية لتعديل هذا العطل','err'); return; }
  if(CU.role==='viewer'){ toast('⛔ السيد لديه صلاحية مشاهدة فقط','err'); return; }
  const st=FAULT_ST.find(x=>x.k===status);
  const log=[...(f.log||[]),{ico:st?.ico||'',label:st?.l||status,by:CU.name,date:ts()}];
  const upd={status,log};
  if(status==='resolved'){ upd.resolvedAt=ts(); upd._tsResolved=Date.now(); upd.resolvedBy=CU.name; upd.resolvedByRole=CU.role; }
  fbUpdate('faults/'+f.id, upd);
  logAct('تحديث عطل', f.location+'/'+f.pointId+' → '+(st?.l||status));
  if(f.fieldSiteId){
    pushFieldN((st?.ico||'')+' عطل '+f.location+'/'+f.pointId+': '+(st?.l||status), f.fieldSiteId, 'info');
  } else {
    pushN((st?.ico||'')+' عطل '+f.location+'/'+f.pointId+': '+(st?.l||status),'info');
  }
  toast('تم تحديث حالة العطل');
}

function doUpdFault(ri, status){
  updFaultStatus(DB.faults[ri], ri, status);
}

async function saveUser(idx){
  const name=val('unm'), role=val('urol');
  if(!name){ toast('أدخل الاسم','err'); return; }

  if(idx>=0){
    // تعديل مستخدم موجود
    const u=DB.users[idx];
    const uid=u.uid||u.id;
    await fbUpdate('users/'+uid,{name,role});
    closeModal(); toast('تم التحديث');
    return;
  }

  // إضافة مستخدم جديد عبر Firebase Auth REST API
  const email=val('uusr'), pw=val('upw');
  if(!email||!pw){ toast('البريد وكلمة المرور مطلوبان','err'); return; }
  if(pw.length<6){ toast('كلمة المرور 6 أحرف على الأقل','err'); return; }
  if(DB.users.find(u=>u.email===email)){ toast('البريد مستخدم مسبقاً','err'); return; }

  const btn=document.querySelector('.mft .btn-bl');
  if(btn){ btn.disabled=true; btn.textContent='⏳ جار الإنشاء...'; }

  try{
    // إنشاء المستخدم في Firebase Auth
    const apiKey = firebaseConfig.apiKey;
    const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${apiKey}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password:pw, returnSecureToken:true})
    });
    const data = await res.json();
    if(data.error){ toast('❌ '+data.error.message,'err'); if(btn){btn.disabled=false;btn.textContent='💾 حفظ';} return; }

    const newUid = data.localId;
    // حفظ بيانات المستخدم في Realtime Database
    await fbSet('users/'+newUid,{
      uid:newUid, name, email, role,
      active:true, perms:null,
      createdBy:CU.name, createdAt:ts()
    });
    logAct('إضافة مستخدم', email+' — '+role);
    closeModal(); toast('✅ تم إنشاء الحساب بنجاح');
  } catch(e){
    toast('❌ خطأ: '+e.message,'err');
    if(btn){ btn.disabled=false; btn.textContent='💾 حفظ'; }
  }
}
async function delUser(i){

}

function genPw(){
  const chars='ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789@#!';
  let pw='';
  for(let i=0;i<8;i++) pw+=chars[Math.floor(Math.random()*chars.length)];
  return pw;
}

async function doResetPassword(i){
  const u = DB.users[i];
  const newPw = document.getElementById('npw-input')?.value?.trim();
  if(!newPw || newPw.length < 6){ toast('كلمة المرور 6 أحرف على الأقل','err'); return; }

  const btn = document.querySelector('.mft .btn-bl');
  if(btn){ btn.disabled=true; btn.textContent='⏳ جار التطبيق...'; }

  try{
    // الطريقة الوحيدة من الـ client: نسجّل دخول المستخدم بكلمة مروره القديمة
    // لكن ليس لدينا كلمته القديمة — نستخدم Firebase Admin عبر REST
    // نستخدم signInWithEmailAndPassword لحساب المدير ثم نحدّث الحساب الآخر
    // عبر Cloudflare Worker (إذا متاح) أو نحفظها مؤقتاً + نرسل reset link

    const apiKey = firebaseConfig.apiKey;

    // محاولة 1: استخدام Cloudflare Worker لتحديث كلمة المرور
    let done = false;
    try{
      const CF_URL = typeof CF_WORKER !== 'undefined' ? CF_WORKER : '';
      if(CF_URL){
        const res = await fetch(CF_URL+'/resetPassword',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({uid: u.uid||u.id, newPassword: newPw, apiKey})
        });
        if(res.ok){ done=true; }
      }
    }catch(e){ console.warn('CF reset failed:', e); }

    if(!done){
      // محاولة 2: إرسال رابط إعادة التعيين + حفظ كلمة المرور مؤقتاً
      await fetch('https://identitytoolkit.googleapis.com/v1/accounts:sendOobCode?key='+apiKey,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({requestType:'PASSWORD_RESET', email: u.email})
      });
    }

    // في كلتا الحالتين — نحفظ كلمة المرور الجديدة في DB ليراها المستخدم
    await fbUpdate('users/'+(u.uid||u.id),{
      tempPw: newPw,
      tempPwSetAt: ts(),
      tempPwSetBy: CU.name
    });

    closeModal();
    toast('✅ كلمة المرور الجديدة: '+newPw+' — تم الحفظ');
    // إشعار للمستخدم
    pushN('🔑 '+u.name+': تم إعادة تعيين كلمة مرورك — راجع حسابك','warn');

  }catch(e){
    toast('❌ خطأ: '+e.message,'err');
    if(btn){ btn.disabled=false; btn.textContent='💾 تطبيق كلمة المرور'; }
  }
}

  area.innerHTML=`<div style="font-size:36px">✅</div><div style="font-weight:700;color:var(--gn)">${esc(file.name)}</div>
    <div style="font-size:12px;color:var(--mt)">${(file.size/1024).toFixed(1)} KB</div>`;
  const reader=new FileReader();
  reader.onload=e=>{
    const content=e.target.result;
    let parsed=null;
    try{
      parsed=JSON.parse(content);
      if(!Array.isArray(parsed)) parsed=[parsed];
    }catch{
      const lines=content.split('\n').filter(l=>l.trim());
      if(lines.length<2){ toast('الملف فارغ أو تنسيق غير صحيح','err'); return; }
      const headers=lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
      parsed=lines.slice(1).map(l=>{
        const vals=l.split(',');
        const obj={};
        headers.forEach((h,i)=>obj[h]=(vals[i]||'').trim().replace(/"/g,''));
        return obj;
      }).filter(o=>Object.values(o).some(v=>v));
    }
    window._impData=parsed;
    const f=parsed[0]||{};
    ['sup','num','dat','amt'].forEach(k=>{
      const el=$('im'+k);
      if(el) el.value=f.supplier||f.مورد||f.sup||
        (k==='num'?(f.invoiceNo||f.num||f.رقم||''):
        (k==='dat'?(f.date||f.تاريخ||''):
        (k==='amt'?(f.amount||f.مبلغ||''):'')));
    });
    if($('imitm')) $('imitm').value=f.items||f.أصناف||f.imitm||'';
    const prev=$('impprev');
    prev.style.display='block';
    prev.innerHTML=`<b style="color:var(--gn)">✅ قُرئ ${parsed.length} سجل من الملف</b>
      <pre style="margin-top:8px;color:var(--mt);overflow:auto;max-height:120px;font-size:11px">${esc(JSON.stringify(parsed.slice(0,2),null,2))}</pre>`;
  };
  reader.readAsText(file,'utf-8');
}

function addSite(){
  const n=val('nst');
  if(!n){ toast('أدخل الاسم','err'); return; }
  if(DB.sites.includes(n)){ toast('موجود مسبقاً','err'); return; }
  // ترقيم تسلسلي لضمان الترتيب بعد الرئيسي
  const siteNum = String(Date.now()).slice(-6);
  fbSet('sites/'+siteNum+'_site', n);
  fbSet('inv/'+fbKey(n)+'/___init',{___init:true});
  toast('تم الإضافة');
}
function renameSite(i){
  const nv=prompt('الاسم الجديد:',DB.sites[i]);
  if(!nv||nv===DB.sites[i]) return;
  if(DB.sites.includes(nv)){ toast('الاسم مستخدم','err'); return; }
  // ترحيل البيانات تحت المفتاح الجديد
  const oldItems=DB.inv[DB.sites[i]]||[];
  const newKey=fbKey(nv), oldKey=fbKey(DB.sites[i]);
  oldItems.forEach(it=>fbSet('inv/'+newKey+'/'+it.id,{...it,currentSite:nv}));
  fbDel('inv/'+oldKey);
  // تحديث اسم الموقع في قائمة المواقع
  const siteId=Object.keys({}).find(k=>false); // سيُحدَّث عبر المزامنة
  if(ISITE===DB.sites[i]) ISITE=nv;
  toast('تم التغيير');
}
function delSite(i){
  if(!confirm('حذف الموقع؟')) return;
  const siteName = DB.sites[i];
  const siteKey = window._sitesKeys && window._sitesKeys[siteName];
  if(siteKey) fbDel('sites/'+siteKey);
  fbDel('inv/'+fbKey(siteName));
  toast('تم حذف المخزن','err');
}

function getGPS(latId,lngId,stId){
  const st=$(stId||'gps-status');
  if(!navigator.geolocation){ if(st) st.textContent='المتصفح لا يدعم GPS'; return; }
  if(st){ st.textContent='⏳ جار التحديد...'; st.style.color='var(--yl)'; }
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude.toFixed(6), lng=pos.coords.longitude.toFixed(6);
    const eL=$(latId||'flat'); if(eL) eL.value=lat;
    const eG=$(lngId||'flng'); if(eG) eG.value=lng;
    if(st){ st.textContent=`✅ ${lat}, ${lng}`; st.style.color='var(--gn)'; }
  },()=>{ if(st){ st.textContent='❌ تعذر التحديد'; st.style.color='var(--rd)'; }},
  {enableHighAccuracy:true,timeout:10000});
}

function searchCamByIP() {
  const ip = val('ipSearchInput');
  const resultDiv = $('ipSearchResult');
  const visibleSites = getVisibleFieldSites();
  
  if(!ip) {
    resultDiv.innerHTML = '<span style="color:var(--yl)">⚠️ الرجاء إدخال عنوان IP</span>';
    return;
  }
  
  let foundCam = null;
  let foundSite = null;
  
  for(const site of visibleSites) {
    for(const cam of site.cameras) {
      if(cam.ip && cam.ip === ip) {
        foundCam = cam;
        foundSite = site;
        break;
      }
    }
    if(foundCam) break;
  }
  
  if(foundCam) {
    fieldSearchResult = { cam: foundCam, site: foundSite };
    resultDiv.innerHTML = `<span style="color:var(--gn)">✅ تم العثور على الكاميرا في موقع: ${esc(foundSite.name)}</span>`;
    
    pgFieldMap();
    
    setTimeout(() => {
      if(foundCam.lat && foundCam.lng) {
        fmFlyTo(foundCam.lat, foundCam.lng, `${foundSite.id}_${foundSite.cameras.indexOf(foundCam)}`);
      }
    }, 500);
  } else {
    fieldSearchResult = null;
    resultDiv.innerHTML = `<span style="color:var(--rd)">❌ لا توجد كاميرا بهذا العنوان IP في المواقع المتاحة لك</span>`;
  }
}

function saveSitePermissions(siteId) {
  const site = DB.fieldSites.find(s => s.id === siteId);
  if(!site) return;
  const allowedUsers = [];
  DB.users.forEach(user => {
    const uid = user.uid||user.id;
    const cb = document.getElementById('usr_'+uid);
    if(cb && cb.checked) allowedUsers.push(uid);
  });
  fbUpdate('fieldSites/'+siteId, {allowedUsers});
  if(_FSITE === siteId) _FSITE = '';
  closeModal();
  toast('تم حفظ صلاحيات الموقع');
  pgFieldMap();
}

  ${fs.cameras.length===0

      ${fs.cameras.map((c,ci)=>{
        const hasGPS=c.lat&&c.lng&&!isNaN(parseFloat(c.lat));

        </div>`;
      }).join('')}
    </div>`}`;
}

        <circle cx="11" cy="15" r="4" fill="white" opacity=".8"/>
        <circle cx="11" cy="15" r="2" fill="${stC}"/>
        <rect x="6" y="22" width="4" height="4" rx="1" fill="${stC}" opacity=".6"/>
      </svg>
      <div>
        <div style="font-weight:800;font-size:18px">${esc(c.name||c.serial||'كاميرا')}</div>
        <div style="color:${stC};font-weight:700">${stL}</div>
        <div style="font-size:12px;color:var(--mt)">📍 ${esc(fs.name)}</div>

    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
      ${c.camType?`<div class="panel" style="padding:10px"><div style="font-size:11px;color:var(--mt)">النوع</div><div style="font-weight:600">${esc(c.camType)}</div></div>`:''}

      ${c.angle?`<div class="panel" style="padding:10px"><div style="font-size:11px;color:var(--mt)">زاوية الرؤية</div><div style="font-weight:600">${esc(c.angle)}°</div></div>`:''}
      ${c.viewDist?`<div class="panel" style="padding:10px"><div style="font-size:11px;color:var(--mt)">مسافة الرؤية</div><div style="font-weight:600">${esc(c.viewDist)} م</div></div>`:''}

  setTimeout(()=>{

    const ptEl = document.getElementById('fpt');
    if(ptEl){ ptEl.value=c.name||c.serial||''; }

}

function initFieldMap(){
  if(_map){ _map.remove(); _map=null; }
  _markers=[]; _distanceMeasure=null;
  const el=$('fld-map'); if(!el) return;
  // ارتفاع ثلثي الشاشة
  el.style.height = Math.round(window.innerHeight * 0.62) + 'px';

  const visibleSites = getVisibleFieldSites();
  const sites = _FSITE ? visibleSites.filter(fs=>fs.id===_FSITE) : visibleSites;
  
  let allCams=[];
  sites.forEach(fs=>fs.cameras.forEach((c,ci)=>{
    if(c.lat&&c.lng&&!isNaN(parseFloat(c.lat)))
      allCams.push({...c,_fsId:fs.id,_fsName:fs.name,_ci:ci});
  }));

  const defLat=33.3152, defLng=44.3661;
  const cLat=allCams.length?allCams.reduce((s,c)=>s+parseFloat(c.lat),0)/allCams.length:defLat;
  const cLng=allCams.length?allCams.reduce((s,c)=>s+parseFloat(c.lng),0)/allCams.length:defLng;

  _map=L.map('fld-map',{maxZoom:22}).setView([cLat,cLng],allCams.length?18:7);

  if(_mapLayer==='custom'&&_customMapUrl){
    const bounds=[[cLat-0.02,cLng-0.03],[cLat+0.02,cLng+0.03]];
    L.imageOverlay(_customMapUrl,bounds,{opacity:1,interactive:false}).addTo(_map);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{opacity:0.15,attribution:'© OSM'}).addTo(_map);
  } else if(_mapLayer==='hybrid'){
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri',maxZoom:22,maxNativeZoom:19}).addTo(_map);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{opacity:0.4,attribution:'© OSM'}).addTo(_map);
  } else if(_mapLayer==='satellite'){
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri World Imagery',maxZoom:22,maxNativeZoom:19}).addTo(_map);
  } else {
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(_map);
  }

  allCams.forEach(c=>{
    const lat=parseFloat(c.lat), lng=parseFloat(c.lng);
    const stColor=c.status==='active'?'#3fb950':c.status==='maintenance'?'#d29922':'#58a6ff';
    const angle=parseFloat(c.beamAngle)||70;
    const rot=parseFloat(c.beamRot)||0;
    const mid=`${c._fsId}_${c._ci}`;
    const viewDist=parseFloat(c.viewDist)||50; // المسافة بالمتر

    // ══ رسم شعاع الرؤية — قطاع حقيقي بالمتر الجغرافي ══
    const mPerLat = 111320;
    const mPerLng = 111320 * Math.cos(lat * Math.PI/180);
    const halfRad  = (angle/2) * Math.PI/180;
    const rotRad   = rot       * Math.PI/180;
    const steps    = Math.max(24, Math.round(angle));

    // كاميرا 360° = دائرة كاملة
    if(angle >= 358){
      L.circle([lat,lng],{
        radius: viewDist,
        color: stColor, fillColor: stColor,
        fillOpacity: 0.18, weight: 1.5, opacity: 0.75
      }).addTo(_map);
    } else {
      // قطاع: مركز + قوس
      const pts = [[lat, lng]];
      for(let i = 0; i <= steps; i++){
        // الزاوية الحالية من البداية للنهاية
        const theta = rotRad - halfRad + (i / steps) * 2 * halfRad;
        // شمال جغرافي = 0° → (dLat+, dLng=0)
        // شرق          = 90° → (dLat=0, dLng+)
        const dLat = (viewDist * Math.cos(theta)) / mPerLat;
        const dLng = (viewDist * Math.sin(theta)) / mPerLng;
        pts.push([lat + dLat, lng + dLng]);
      }
      pts.push([lat, lng]); // إغلاق القطاع
      L.polygon(pts,{
        color: stColor, fillColor: stColor,
        fillOpacity: 0.20, weight: 1.8, opacity: 0.80
      }).addTo(_map);
    }

    // ══ أيقونة الكاميرا الثابتة (صغيرة) ══
    const sz=32;
    const svgIcon=`<svg width="${sz}" height="${sz}" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="15" fill="${stColor}" opacity="0.15" stroke="${stColor}" stroke-width="1.5"/>
      <rect x="5" y="11" width="14" height="10" rx="2.5" fill="${stColor}"/>
      <polygon points="19,13 27,10 27,22 19,19" fill="${stColor}" opacity="0.85"/>
      <circle cx="11" cy="16" r="3.5" fill="white" opacity="0.9"/>
      <circle cx="11" cy="16" r="2" fill="${stColor}"/>
    </svg>`;

    const icon=L.divIcon({html:svgIcon,className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
    const marker=L.marker([lat,lng],{icon,zIndexOffset:500}).addTo(_map);

    const popup=`<div style="min-width:230px;direction:rtl;font-family:inherit">
      <div style="font-weight:800;font-size:18px;color:${stColor};margin-bottom:6px">
        📷 ${esc(c.name||c.serial||'كاميرا')}
      </div>
      <div style="font-size:12px;color:#7d8590;margin-bottom:8px">📍 ${esc(c._fsName)}</div>
      ${c.camType?`<div style="font-size:12px;margin-bottom:3px"><b>النوع:</b> ${esc(c.camType)}</div>`:''}
      ${c.res?`<div style="font-size:12px;margin-bottom:3px"><b>الدقة:</b> ${esc(c.res)}</div>`:''}
      ${c.angle?`<div style="font-size:12px;margin-bottom:3px"><b>زاوية الرؤية:</b> ${esc(c.angle)}°</div>`:''}
      ${c.dir?`<div style="font-size:12px;margin-bottom:3px"><b>الاتجاه:</b> ${esc(c.dir)}</div>`:''}
      ${c.installDesc?`<div style="font-size:12px;margin-bottom:3px"><b>موقع التنصيب:</b> ${esc(c.installDesc)}</div>`:''}
      ${c.ip?`<div style="font-size:12px;margin-bottom:3px"><b>IP:</b> <span style="direction:ltr;display:inline-block">${esc(c.ip)}</span></div>`:''}
      ${c.model?`<div style="font-size:12px;margin-bottom:3px"><b>الموديل:</b> ${esc(c.model)}</div>`:''}
      ${c.mfr?`<div style="font-size:12px;margin-bottom:3px"><b>الشركة:</b> ${esc(c.mfr)}</div>`:''}
      ${c.serial?`<div style="font-size:12px;margin-bottom:3px"><b>السيريال:</b> ${esc(c.serial)}</div>`:''}
      <div style="font-size:12px;margin-bottom:6px"><b>الحالة:</b> ${c.status==='active'?'🟢 تعمل':c.status==='maintenance'?'🟡 صيانة':'⚪ مجهول'}</div>
      <div style="font-size:10px;color:#555;direction:ltr;margin-bottom:8px">${lat.toFixed(6)}, ${lng.toFixed(6)}</div>
      ${p('fieldmap')?`<button onclick="openEditFieldCam('${c._fsId}',${c._ci});_map&&_map.closePopup()"
        style="background:#58a6ff22;border:1px solid #58a6ff44;color:#58a6ff;padding:5px 14px;
        border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;width:100%">✏️ تعديل</button>`:''}
    </div>`;
    marker.bindPopup(L.popup({maxWidth:300}).setContent(popup));
    _markers.push({id:mid,marker});
  });

  if(allCams.length>1){
    const g=L.featureGroup(_markers.map(m=>m.marker));
    _map.fitBounds(g.getBounds().pad(0.15));
  }

  // ══ 4. موقعي الحالي ══
  addMyLocationToMap();

  // ══ 6. قياس المسافة ══
  addDistanceMeasureTool();
}

let _myLocationMarker = null;
let _distanceMeasure = null;
let _measurePoints = [];
let _measureLines = [];
let _measuringMode = false;

function addMyLocationToMap(){
  if(!navigator.geolocation || !_map) return;
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude, lng=pos.coords.longitude;
    const myIcon = L.divIcon({
      html:`<div style="width:20px;height:20px;background:#0084ff;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 4px rgba(0,132,255,.3)"></div>`,
      className:'', iconSize:[20,20], iconAnchor:[10,10]
    });
    if(_myLocationMarker){ _myLocationMarker.remove(); }
    _myLocationMarker = L.marker([lat,lng],{icon:myIcon,zIndexOffset:1000})
      .addTo(_map)
      .bindPopup(`<div style="text-align:center;font-family:inherit">
        <div style="font-size:18px">📍 موقعك الحالي</div>
        <div style="font-size:12px;color:#666;direction:ltr">${lat.toFixed(6)}, ${lng.toFixed(6)}</div>
        <div style="font-size:12px;color:#666">الدقة: ±${Math.round(pos.coords.accuracy)}م</div>
      </div>`);

    // دائرة دقة الموقع
    L.circle([lat,lng],{
      radius: pos.coords.accuracy,
      color:'#0084ff', fillColor:'#0084ff', fillOpacity:0.08, weight:1.5, dashArray:'5,5'
    }).addTo(_map);

    // زر للتوجه لموقعي
    const locBtn = document.getElementById('btn-my-loc');
    if(locBtn){
      locBtn.style.opacity='1';
      locBtn.onclick=()=>_map.flyTo([lat,lng],19,{duration:1});
    }
  }, ()=>{}, {enableHighAccuracy:true, timeout:8000});
}

function addDistanceMeasureTool(){
  if(!_map) return;
  _map.on('click', e=>{
    if(!_measuringMode) return;
    _measurePoints.push(e.latlng);
    L.circleMarker(e.latlng,{radius:5,color:'#ff6b00',fillColor:'#ff6b00',fillOpacity:1}).addTo(_map);

    if(_measurePoints.length>1){
      const p1=_measurePoints[_measurePoints.length-2];
      const p2=_measurePoints[_measurePoints.length-1];
      const line=L.polyline([p1,p2],{color:'#ff6b00',weight:2.5,dashArray:'6,4'}).addTo(_map);
      _measureLines.push(line);
      const dist=_map.distance(p1,p2);
      const total=_measurePoints.reduce((s,_,i)=>i===0?0:s+_map.distance(_measurePoints[i-1],_measurePoints[i]),0);
      const midLat=(p1.lat+p2.lat)/2, midLng=(p1.lng+p2.lng)/2;
      L.marker([midLat,midLng],{
        icon:L.divIcon({
          html:`<div style="background:#ff6b00;color:#fff;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:700;white-space:nowrap;font-family:inherit">${dist<1000?Math.round(dist)+'م':( dist/1000).toFixed(2)+'كم'}</div>`,
          className:'', iconAnchor:[30,10]
        }), interactive:false
      }).addTo(_map);
      if(_measurePoints.length>2){
        const totLbl=document.getElementById('measure-total');
        if(totLbl) totLbl.textContent='المجموع: '+(total<1000?Math.round(total)+'م':(total/1000).toFixed(2)+'كم');
      }
    }
  });
}

function toggleMeasure(){
  _measuringMode = !_measuringMode;
  const btn=document.getElementById('btn-measure');
  if(btn){
    btn.style.background = _measuringMode?'#ff6b00':'var(--sf)';
    btn.style.color = _measuringMode?'#fff':'var(--tx)';
    btn.title = _measuringMode?'إيقاف القياس (انقر لإضافة نقاط)':'قياس المسافة';
  }
  const lbl=document.getElementById('measure-total');
  if(lbl) lbl.style.display = _measuringMode?'inline':'none';
  if(!_measuringMode){
    // مسح خطوط القياس
    _measureLines.forEach(l=>l.remove());
    _measureLines=[]; _measurePoints=[];
    const totLbl=document.getElementById('measure-total');
    if(totLbl) totLbl.textContent='';
  }
  if(_map) _map.getContainer().style.cursor = _measuringMode?'crosshair':'';
  toast(_measuringMode?'📏 وضع القياس — انقر على الخريطة لإضافة نقاط':'تم إيقاف القياس');
}

function fmFlyTo(lat,lng,mid){
  if(!_map) return;
  _map.flyTo([lat,lng],19,{duration:1.2});
  const m=_markers.find(x=>x.id===mid);
  if(m) setTimeout(()=>m.marker.openPopup(),1300);
}
function fmFitAll(){
  if(!_map) return;
  if(_markers.length){
    const g=L.featureGroup(_markers.map(m=>m.marker));
    _map.fitBounds(g.getBounds().pad(0.2));
  } else { _map.setView([33.3152,44.3661],7); }
}

function setBeamAngle(deg){

let _faultMarkers = [];

function toggleFaultsLayer(){
  _faultsLayerOn = !_faultsLayerOn;

function showFaultsOnMap(){
  if(!_map) return;
  _faultMarkers.forEach(m=>m.remove()); _faultMarkers=[];
  const activeFaults = getVisibleFaults().filter(f=>f.status!=='resolved');
  activeFaults.forEach(f=>{
    // ابحث عن إحداثيات الكاميرا المرتبطة
    const site = DB.fieldSites.find(s=>s.id===f.fieldSiteId||s.name===f.location);
    if(!site) return;
    const cam = site.cameras?.find(c=>c.name===f.pointId||c.serial===f.camSN);
    const lat = cam?.lat ? parseFloat(cam.lat) : null;
    const lng = cam?.lng ? parseFloat(cam.lng) : null;
    if(!lat||!lng||isNaN(lat)||isNaN(lng)) return;
    const pri = f.priority==='high'?'#f85149':f.priority==='medium'?'#d29922':'#58a6ff';
    const icon = L.divIcon({
      html:`<div onclick="go('faults')" style="width:22px;height:22px;background:${pri};border:3px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.4);cursor:pointer;animation:pulse 1.5s infinite"></div>`,
      className:'', iconSize:[22,22], iconAnchor:[11,11]
    });
    const m = L.marker([lat,lng],{icon,zIndexOffset:900})
      .addTo(_map)
      .bindPopup(`<div style="font-family:inherit;min-width:160px">
        <div style="font-weight:700;color:${pri};margin-bottom:4px">${f.priority==='high'?'🔴 عاجل':'🟡 متوسط'}</div>
        <div style="font-weight:700">${esc(f.location)}</div>
        <div style="font-size:12px;color:#666">${esc(f.pointId)}</div>
        <div style="font-size:12px;margin-top:4px">${esc(f.reason)}</div>
      </div>`);
    _faultMarkers.push(m);
  });
  if(_faultMarkers.length===0) toast('لا أعطال نشطة لها إحداثيات','warn');
  else toast('🔴 '+_faultMarkers.length+' عطل على الخريطة');
}

function initCompass(){
  const canvas = document.getElementById('compass-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  let dragging = false;
  let _rot = parseFloat(document.getElementById('fcbr')?.value)||0;

  const dirNames = ['شمال','شمال شرق','شرق','جنوب شرق','جنوب','جنوب غرب','غرب','شمال غرب'];

  function drawCompass(deg){
    const W=160,H=160,cx=80,cy=80,R=72;
    ctx.clearRect(0,0,W,H);
    const grad=ctx.createRadialGradient(cx,cy,10,cx,cy,R);
    grad.addColorStop(0,'#1a2332'); grad.addColorStop(1,'#0d1117');
    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
    ctx.fillStyle=grad; ctx.fill();
    ctx.strokeStyle='#30363d'; ctx.lineWidth=2; ctx.stroke();
    for(let i=0;i<360;i+=10){
      const a=(i-90)*Math.PI/180;
      const inner=i%90===0?R-18:i%45===0?R-14:R-9;
      ctx.beginPath();
      ctx.moveTo(cx+inner*Math.cos(a), cy+inner*Math.sin(a));
      ctx.lineTo(cx+(R-3)*Math.cos(a), cy+(R-3)*Math.sin(a));
      ctx.strokeStyle=i%90===0?'#58a6ff':i%45===0?'#8b949e':'#30363d';
      ctx.lineWidth=i%90===0?2:1; ctx.stroke();
    }
    const lblMap={0:'N',90:'E',180:'S',270:'W'};
    [0,90,180,270].forEach(a=>{
      const rad=(a-90)*Math.PI/180;
      const lx=cx+(R-28)*Math.cos(rad), ly=cy+(R-28)*Math.sin(rad);
      ctx.fillStyle=a===0?'#f85149':'#58a6ff';
      ctx.font='bold 13px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(lblMap[a],lx,ly);
    });
    const needleRad=(deg-90)*Math.PI/180;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx-(R-22)*Math.cos(needleRad), cy-(R-22)*Math.sin(needleRad));
    ctx.strokeStyle='#7d8590'; ctx.lineWidth=3; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+(R-14)*Math.cos(needleRad), cy+(R-14)*Math.sin(needleRad));
    ctx.strokeStyle='#f85149'; ctx.lineWidth=3; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill();
    const beamAngle=parseFloat(document.getElementById('fcba')?.value)||70;
    if(beamAngle>=358){
      // PTZ 360° — دائرة كاملة في البوصلة
      ctx.beginPath(); ctx.arc(cx,cy,R-6,0,Math.PI*2);
      ctx.fillStyle='rgba(188,140,255,0.15)';
      ctx.strokeStyle='#bc8cff'; ctx.lineWidth=1.5;
      ctx.fill(); ctx.stroke();
      // نص PTZ
      ctx.fillStyle='#bc8cff'; ctx.font='bold 11px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('PTZ 360°',cx,cy+20);
    } else {
      const half=(beamAngle/2)*Math.PI/180;
      const bRad=(deg-90)*Math.PI/180;
      ctx.beginPath(); ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,R-6,bRad-half,bRad+half);
      ctx.closePath();
      ctx.fillStyle='rgba(88,166,255,0.15)';
      ctx.strokeStyle='#58a6ff'; ctx.lineWidth=1.5;
      ctx.fill(); ctx.stroke();
    }
  }

  function updateLabel(deg){
    const d=((deg%360)+360)%360;
    const el=document.getElementById('compass-deg-label');
    const dl=document.getElementById('compass-dir-label');
    const hi=document.getElementById('fcbr');
    if(el) el.textContent=Math.round(deg)+'°';
    if(dl) dl.textContent=dirNames[Math.round(d/45)%8];
    if(hi) hi.value=Math.round(deg);
  }

  function angleFromCenter(e){
    const rect=canvas.getBoundingClientRect();
    const ex=e.touches?e.touches[0].clientX:e.clientX;
    const ey=e.touches?e.touches[0].clientY:e.clientY;
    return Math.atan2(ex-rect.left-80,-(ey-rect.top-80))*180/Math.PI;
  }

  canvas.addEventListener('mousedown',  ()=>{ dragging=true; canvas.style.cursor='grabbing'; });
  canvas.addEventListener('mousemove',  e=>{ if(!dragging) return; _rot=angleFromCenter(e); drawCompass(_rot); updateLabel(_rot); });
  canvas.addEventListener('mouseup',    ()=>{ dragging=false; canvas.style.cursor='grab'; });
  canvas.addEventListener('mouseleave', ()=>{ dragging=false; canvas.style.cursor='grab'; });
  canvas.addEventListener('touchstart', e=>{ dragging=true; e.preventDefault(); },{passive:false});
  canvas.addEventListener('touchmove',  e=>{ if(!dragging) return; e.preventDefault(); _rot=angleFromCenter(e); drawCompass(_rot); updateLabel(_rot); },{passive:false});
  canvas.addEventListener('touchend',   ()=>{ dragging=false; });

  window.setCompass = function(deg){ _rot=parseFloat(deg); drawCompass(_rot); updateLabel(_rot); };

  const fcba=document.getElementById('fcba');
  if(fcba) fcba.addEventListener('input',()=>drawCompass(_rot));

  drawCompass(_rot);
  updateLabel(_rot);
}

function saveFieldCam(fsId,ci){

  const fs=DB.fieldSites.find(x=>x.id===fsId); if(!fs) return;
  const cam={
    id:(ci>=0&&fs.cameras[ci]?.id)||gid(),
    name:nm, serial:val('fcsr'), camType:val('fccT'), res:val('fcrs'),
    angle:val('fcan'), model:val('fcmd'), mfr:val('fcmf'), ip:val('fcip'),
    installDesc:val('fcdc'), dir:val('fcdir'), status:val('fcst'),
    lat:val('fclat'), lng:val('fclng'),
    beamAngle:$('fcba')?.value||70, beamRot:$('fcbr')?.value||0, viewDist:parseFloat($('fcvd')?.value)||50,
    addedBy:CU.name, addedAt:(ci>=0&&fs.cameras[ci]?.addedAt)||ts()
  };
  fbSet('fieldSites/'+fsId+'/cameras/'+cam.id, cam);
  pushFieldN('📷 '+(ci>=0?'تعديل':'إضافة')+' كاميرا: '+nm+' ← '+fs.name, fsId);

}
function getDirArrow(dir){
  const DIR_MAP = {'↖ شمال غرب':'↖','⬆ شمال':'⬆','↗ شمال شرق':'↗','⬅ غرب':'⬅','⊙ عام':'⊙','➡ شرق':'➡','↙ جنوب غرب':'↙','⬇ جنوب':'⬇','↘ جنوب شرق':'↘'};
  return DIR_MAP[dir]||'⊙';
}
function selDir(btn,dir){

function doSearch(q){
  if(!q||q.length<2){ $('srch-res').innerHTML='<div style="text-align:center;color:var(--mt);padding:30px">أدخل كلمتين على الأقل</div>'; return; }
  q=q.toLowerCase();
  const res=[];

  // البحث في المخزن
  DB.sites.forEach(site=>{
    (DB.inv[site]||[]).forEach(it=>{
      if([it.name,it.serial,it.type,it.currentSite].some(x=>x&&x.toLowerCase().includes(q))){
        res.push({type:'inv',icon:'📦',title:it.name,sub:it.type+' — '+it.currentSite,badge:it.status,id:it.id});
      }
    });
  });

  // البحث في الأعطال
  DB.faults.forEach(f=>{
    if([f.location,f.pointId,f.reason,f.desc,f.by].some(x=>x&&x.toLowerCase().includes(q))){
      res.push({type:'fault',icon:'⚠️',title:f.location+' — '+f.pointId,sub:f.reason,badge:f.status,id:f.id});
    }
  });

  // البحث في الحركات
  DB.moves.forEach(m=>{
    if([m.name,m.from,m.to,m.by].some(x=>x&&x.toLowerCase().includes(q))){
      res.push({type:'move',icon:'🔄',title:m.name,sub:m.from+' ← '+m.to,badge:m.date,id:m.id});
    }
  });

  // البحث في الفواتير
  DB.invoices.forEach(inv=>{
    if([inv.supplier,inv.num,inv.site,inv.notes].some(x=>x&&x.toLowerCase().includes(q))){
      res.push({type:'invoice',icon:'🧾',title:inv.supplier,sub:'فاتورة رقم: '+inv.num,badge:inv.date,id:inv.id});
    }
  });

  // البحث في المواقع الميدانية والكاميرات
  DB.fieldSites.forEach(fs=>{
    if(fs.name.toLowerCase().includes(q)||fs.desc?.toLowerCase().includes(q)){
      res.push({type:'field',icon:'📍',title:fs.name,sub:fs.desc||'',badge:fs.cameras.length+' كاميرا',id:fs.id});
    }
    fs.cameras.forEach(c=>{
      if([c.name,c.serial,c.model,c.ip].some(x=>x&&x.toLowerCase().includes(q))){
        res.push({type:'cam',icon:'📷',title:c.name,sub:fs.name+' — '+c.serial,badge:c.status,id:c.id});
      }
    });
  });

  const el=$('srch-res');
  if(!res.length){ el.innerHTML='<div style="text-align:center;color:var(--mt);padding:30px">لا نتائج لـ "'+q+'"</div>'; return; }
  el.innerHTML=`<div style="color:var(--mt);font-size:12px;margin-bottom:12px">${res.length} نتيجة</div>`+
    res.map(r=>`
    <div class="panel" style="margin-bottom:8px;display:flex;align-items:center;gap:12px">
      <div style="font-size:26px">${r.icon}</div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:17px">${esc(r.title)}</div>
        <div style="font-size:12px;color:var(--mt)">${esc(r.sub)}</div>
      </div>
      <span style="font-size:11px;background:var(--bg);padding:3px 8px;border-radius:5px;color:var(--mt)">${esc(r.badge||'')}</span>
    </div>`).join('');
}

    <div class="panel" style="border-right:3px solid var(--yl);margin-bottom:8px">

      </div>
      <button class="btn btn-sm btn-gy" style="margin-top:8px" onclick="openFaultComments('${f.id}')">💬 تعليقات (${(f.comments||[]).length})</button>
    </div>`).join('')}

  ${!urgent.length&&!inprog.length?`<div style="text-align:center;padding:60px;color:var(--gn)"><div style="font-size:48px">✅</div><div style="margin-top:12px;font-weight:600">لا أعطال عاجلة</div></div>`:''}`;

// تعليقات على العطل
function openFaultComments(faultId){
  const f = DB.faults.find(x=>x.id===faultId);
  if(!f) return;
  const comments = f.comments||[];
  openModal(`${mhd('💬 تعليقات: '+f.location+' — '+f.pointId)}
  <div style="max-height:300px;overflow-y:auto;margin-bottom:12px">
    ${comments.length?comments.map(c=>`
    <div style="background:var(--bg);border-radius:8px;padding:10px 12px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-weight:600;font-size:17px;color:var(--bl)">👤 ${esc(c.by)}</span>
        <span style="font-size:11px;color:var(--mt)">${esc(c.time)}</span>
      </div>
      <div style="font-size:17px">${esc(c.text)}</div>
    </div>`).join('')
    :'<div style="text-align:center;color:var(--mt);padding:20px">لا تعليقات بعد</div>'}
  </div>
  <div style="display:flex;gap:8px">
    <input id="cmt-txt" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--br);background:var(--sf);color:var(--tx)" placeholder="أضف تعليقاً...">
    <button class="btn btn-bl" onclick="addFaultComment('${faultId}')">إرسال</button>
  </div>`);
}

function addFaultComment(faultId){
  const txt=val('cmt-txt');
  if(!txt) return;
  const f=DB.faults.find(x=>x.id===faultId);
  if(!f) return;
  const comments=[...(f.comments||[]),{by:CU.name,time:ts(),text:txt,_ts:Date.now()}];
  fbUpdate('faults/'+faultId,{comments});
  logAct('تعليق على عطل', f.location+'/'+f.pointId+': '+txt);
  closeModal();
  toast('تم إضافة التعليق');
}

// ═══════════════════════════════════════════════════════
//  📊 التقارير والإحصائيات + ⏱️ SLA
// ═══════════════════════════════════════════════════════
function pgReports(){
  // ── إحصائيات الأعطال ──
  const totalFaults = DB.faults.length;
  const openF   = DB.faults.filter(f=>f.status==='open').length;
  const resolvedF = DB.faults.filter(f=>f.status==='resolved').length;
  const highF   = DB.faults.filter(f=>f.priority==='high').length;

  // ── SLA: حساب متوسط وقت الحل ──
  const resolvedWithTime = DB.faults.filter(f=>f.status==='resolved'&&f.resolvedAt&&f._ts&&f.date);
  let avgSLA = 0;
  if(resolvedWithTime.length){
    const total = resolvedWithTime.reduce((sum,f)=>{
      // نستخدم _ts إذا متاح، وإلا نتجاهل
      const diffH = f._tsResolved ? (f._tsResolved - f._ts)/(1000*60*60) : 0;
      return sum + Math.max(0, diffH);
    },0);
    avgSLA = (total/resolvedWithTime.length).toFixed(1);
  }

  // ── أكثر المواقع أعطالاً ──
  const byLoc = {};
  DB.faults.forEach(f=>{ byLoc[f.location]=(byLoc[f.location]||0)+1; });
  const topLocs = Object.entries(byLoc).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // ── أكثر الأسباب تكراراً ──
  const byReason = {};
  DB.faults.forEach(f=>{ byReason[f.reason]=(byReason[f.reason]||0)+1; });
  const topReasons = Object.entries(byReason).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // ── إحصائيات المخزن ──
  let totalItems=0, deployedItems=0, warehouseItems=0;
  DB.sites.forEach(s=>{ (DB.inv[s]||[]).forEach(it=>{ totalItems++; if(it.status==='deployed') deployedItems++; if(it.status==='warehouse') warehouseItems++; }); });

  // ── إحصائيات الكاميرات الميدانية ──
  const totalCams = DB.fieldSites.reduce((s,fs)=>s+fs.cameras.length,0);

  $('page').innerHTML=`
  <div class="ph">
    <div class="pt">📊 التقارير والإحصائيات</div>
    <button class="btn btn-bl" onclick="exportReportCSV()">⬇️ تصدير CSV</button>
  </div>

  <!-- SLA بارز -->
  <div style="margin:0 16px 16px;background:linear-gradient(135deg,#1f2d3d,#162032);border:1px solid #58a6ff44;border-radius:14px;padding:20px;text-align:center">
    <div style="font-size:17px;color:var(--mt);margin-bottom:6px">⏱️ متوسط وقت حل الأعطال (SLA)</div>
    <div style="font-size:36px;font-weight:700;color:${avgSLA>24?'var(--rd)':avgSLA>8?'var(--yl)':'var(--gn)'}">${avgSLA} <span style="font-size:18px;color:var(--mt)">ساعة</span></div>
    <div style="font-size:12px;color:var(--mt);margin-top:4px">بناءً على ${resolvedWithTime.length} عطل محلول</div>
  </div>

  <!-- إحصائيات الأعطال -->
  <div style="margin:0 16px 16px">
    <div style="font-weight:700;margin-bottom:10px;color:var(--bl)">⚠️ إحصائيات الأعطال</div>
    <div class="cg" style="grid-template-columns:repeat(4,1fr);gap:8px">
      ${[['الإجمالي',totalFaults,'var(--bl)'],['مفتوحة',openF,'var(--rd)'],['محلولة',resolvedF,'var(--gn)'],['عاجلة',highF,'var(--yl)']].map(([l,v,c])=>`
      <div style="background:var(--sf);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--br)">
        <div style="font-size:26px;font-weight:700;color:${c}">${v}</div>
        <div style="font-size:11px;color:var(--mt)">${l}</div>
      </div>`).join('')}
    </div>
  </div>

  <!-- أكثر المواقع أعطالاً -->
  ${topLocs.length?`
  <div style="margin:0 16px 16px">
    <div style="font-weight:700;margin-bottom:10px;color:var(--bl)">📍 أكثر المواقع أعطالاً</div>
    ${topLocs.map(([loc,cnt])=>`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <div style="flex:1;font-size:17px">${esc(loc)}</div>
      <div style="background:var(--rd);height:8px;border-radius:4px;width:${Math.round(cnt/topLocs[0][1]*120)}px"></div>
      <div style="font-size:17px;font-weight:700;color:var(--rd);min-width:20px">${cnt}</div>
    </div>`).join('')}
  </div>`:''}

  <!-- أكثر الأسباب -->
  ${topReasons.length?`
  <div style="margin:0 16px 16px">
    <div style="font-weight:700;margin-bottom:10px;color:var(--bl)">🔧 أكثر أسباب الأعطال</div>
    ${topReasons.map(([r,cnt])=>`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <div style="flex:1;font-size:17px">${esc(r)}</div>
      <div style="background:var(--yl);height:8px;border-radius:4px;width:${Math.round(cnt/topReasons[0][1]*120)}px"></div>
      <div style="font-size:17px;font-weight:700;color:var(--yl);min-width:20px">${cnt}</div>
    </div>`).join('')}
  </div>`:''}

  <!-- إحصائيات المخزن -->
  <div style="margin:0 16px 16px">
    <div style="font-weight:700;margin-bottom:10px;color:var(--bl)">📦 إحصائيات المخزن</div>
    <div class="cg" style="grid-template-columns:repeat(3,1fr);gap:8px">
      ${[['إجمالي',totalItems,'var(--bl)'],['منصوبة',deployedItems,'var(--gn)'],['في المخزن',warehouseItems,'var(--mt)']].map(([l,v,c])=>`
      <div style="background:var(--sf);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--br)">
        <div style="font-size:26px;font-weight:700;color:${c}">${v}</div>
        <div style="font-size:11px;color:var(--mt)">${l}</div>
      </div>`).join('')}
    </div>
  </div>

  <!-- إحصائيات الكاميرات -->
  <div style="margin:0 16px 24px">
    <div style="font-weight:700;margin-bottom:10px;color:var(--bl)">📷 الكاميرات الميدانية</div>
    <div class="cg" style="grid-template-columns:repeat(2,1fr);gap:8px">
      ${[['إجمالي الكاميرات',totalCams,'var(--bl)'],['المواقع',DB.fieldSites.length,'var(--pu)']].map(([l,v,c])=>`
      <div style="background:var(--sf);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--br)">
        <div style="font-size:26px;font-weight:700;color:${c}">${v}</div>
        <div style="font-size:11px;color:var(--mt)">${l}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function exportReportCSV(){
  const rows=[['الموقع','النقطة','السبب','الأولوية','الحالة','المبلغ','التاريخ','تاريخ الحل']];
  DB.faults.forEach(f=>rows.push([f.location,f.pointId,f.reason,f.priority==='high'?'عاجل':'عادي',f.status,f.by,f.date,f.resolvedAt||'']));
  const csv=rows.map(r=>r.map(v=>'"'+(v||'').split('"').join('""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='تقرير_الأعطال_'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
  toast('تم تصدير التقرير');
  logAct('تصدير تقرير CSV','الأعطال');
}
